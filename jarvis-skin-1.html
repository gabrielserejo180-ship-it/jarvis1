<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S — Just A Rather Very Intelligent System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap');
  :root {
    --primary:#00d4ff; --secondary:#0088cc; --accent:#ff6600;
    --bg-dark:#020a12; --bg-panel:rgba(0,20,40,0.85); --bg-input:rgba(0,40,70,0.7);
    --text:#b8e4f5; --text-dim:#5a8fa8;
    --glow:0 0 20px rgba(0,212,255,0.4); --border:rgba(0,212,255,0.25);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg-dark);font-family:'Share Tech Mono',monospace;color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
  #bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .shell{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;max-width:960px;margin:0 auto;padding:14px;gap:8px;}

  /* HEADER */
  .header{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:10px;}
  .logo{display:flex;align-items:center;gap:14px;}
  .arc-reactor{width:42px;height:42px;flex-shrink:0;}
  .arc-reactor svg{width:100%;height:100%;animation:reactor-spin 6s linear infinite;filter:drop-shadow(0 0 8px var(--primary));}
  @keyframes reactor-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .logo-text h1{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;color:var(--primary);letter-spacing:0.3em;text-shadow:var(--glow);}
  .logo-text p{font-size:0.6rem;color:var(--text-dim);letter-spacing:0.2em;margin-top:2px;}
  .status-panel{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
  .status-row{display:flex;align-items:center;gap:6px;font-size:0.6rem;color:var(--text-dim);letter-spacing:0.1em;}
  .dot{width:6px;height:6px;border-radius:50%;background:#00ff88;animation:pulse 2s ease-in-out infinite;box-shadow:0 0 6px #00ff88;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  /* TOOLBAR */
  .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .toolbar-input{
    flex:1;min-width:200px;
    background:rgba(0,20,40,0.7);border:1px solid var(--border);
    border-radius:3px;color:var(--text-dim);font-family:'Share Tech Mono',monospace;
    font-size:0.62rem;padding:5px 10px;outline:none;letter-spacing:0.05em;
  }
  .toolbar-input:focus{border-color:var(--primary);}
  .toolbar-input::placeholder{color:rgba(90,143,168,0.5);}
  .tb-btn{
    background:rgba(0,212,255,0.07);border:1px solid var(--border);
    color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:0.6rem;
    letter-spacing:0.1em;padding:5px 10px;cursor:pointer;border-radius:3px;
    transition:all 0.15s;white-space:nowrap;
  }
  .tb-btn:hover{background:rgba(0,212,255,0.15);color:var(--primary);border-color:var(--primary);}
  .tb-btn.active{background:rgba(0,212,255,0.2);color:var(--primary);border-color:var(--primary);}
  .tb-sep{width:1px;height:20px;background:var(--border);flex-shrink:0;}
  #sheets-status{font-size:0.58rem;letter-spacing:0.08em;padding:4px 8px;border-radius:3px;border:1px solid var(--border);}
  #sheets-status.ok{color:#00ff88;border-color:rgba(0,255,136,0.3);background:rgba(0,255,136,0.05);}
  #sheets-status.err{color:#ff4444;border-color:rgba(255,68,68,0.3);}
  #sheets-status.loading{color:var(--text-dim);}

  /* MEMÓRIA */
  .memory-bar{display:flex;align-items:center;gap:10px;padding:5px 12px;background:var(--bg-panel);border:1px solid var(--border);border-radius:4px;font-size:0.6rem;color:var(--text-dim);letter-spacing:0.08em;overflow:hidden;white-space:nowrap;}
  .memory-label{flex-shrink:0;color:var(--primary);}
  .memory-scroll{flex:1;overflow:hidden;}
  .memory-tags{display:flex;gap:6px;}
  .mem-tag{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);border-radius:3px;padding:1px 7px;color:var(--primary);font-size:0.58rem;white-space:nowrap;cursor:pointer;transition:background 0.1s;}
  .mem-tag:hover{background:rgba(0,212,255,0.22);}

  /* CHAT */
  .chat-area{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding-right:4px;scrollbar-width:thin;scrollbar-color:var(--secondary) transparent;}
  .chat-area::-webkit-scrollbar{width:3px;}
  .chat-area::-webkit-scrollbar-thumb{background:var(--secondary);border-radius:2px;}
  .msg{display:flex;gap:10px;animation:msg-in 0.3s ease;}
  @keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{flex-direction:row-reverse;}
  .msg-avatar{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.68rem;flex-shrink:0;background:var(--bg-panel);}
  .msg.jarvis .msg-avatar{color:var(--primary);border-color:var(--primary);box-shadow:0 0 10px rgba(0,212,255,0.3);}
  .msg.user .msg-avatar{color:var(--accent);border-color:var(--accent);box-shadow:0 0 10px rgba(255,102,0,0.3);}
  .msg-content{max-width:82%;display:flex;flex-direction:column;gap:3px;}
  .msg-label{font-size:0.56rem;letter-spacing:0.15em;color:var(--text-dim);}
  .msg.user .msg-label{text-align:right;color:rgba(255,102,0,0.7);}
  .bubble{padding:9px 13px;border-radius:2px;font-size:0.8rem;line-height:1.6;}
  .msg.jarvis .bubble{background:var(--bg-panel);border:1px solid var(--border);border-left:2px solid var(--primary);color:var(--text);}
  .msg.user .bubble{background:rgba(255,102,0,0.08);border:1px solid rgba(255,102,0,0.25);border-right:2px solid var(--accent);color:#f0c9a0;text-align:right;}
  .bubble.typing{display:flex;align-items:center;gap:5px;min-height:34px;}
  .typing-dot{width:6px;height:6px;border-radius:50%;background:var(--primary);animation:typing-bounce 1.2s ease-in-out infinite;}
  .typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
  @keyframes typing-bounce{0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-6px);opacity:1}}

  /* badges */
  .badge-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px;}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:0.56rem;letter-spacing:0.08em;padding:1px 7px;border-radius:3px;}
  .badge.learned{color:#00ff88;border:1px solid rgba(0,255,136,0.3);background:rgba(0,255,136,0.06);}
  .badge.search{color:#ffcc00;border:1px solid rgba(255,204,0,0.3);background:rgba(255,204,0,0.06);}
  .badge.learned::before{content:'◈ APRENDIDO: ';}
  .badge.search::before{content:'🌐 WEB: ';}

  /* ZONA DE VOZ */
  .voice-zone{display:flex;flex-direction:column;align-items:center;gap:8px;padding-top:8px;}
  .wave-container{width:100%;height:44px;display:flex;align-items:center;justify-content:center;gap:3px;overflow:hidden;}
  .wave-bar{width:3px;border-radius:2px;background:var(--primary);opacity:0.3;transition:height 0.08s ease,opacity 0.1s ease;height:4px;}
  .wave-bar.active{opacity:0.9;box-shadow:0 0 6px var(--primary);}
  .mic-row{display:flex;align-items:center;gap:16px;}
  .mic-btn{width:60px;height:60px;border-radius:50%;background:rgba(0,212,255,0.08);border:2px solid var(--primary);color:var(--primary);font-size:1.5rem;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(0,212,255,0.2);}
  .mic-btn:hover{background:rgba(0,212,255,0.18);box-shadow:var(--glow);}
  .mic-btn.listening{background:rgba(255,50,50,0.15);border-color:#ff4444;color:#ff4444;box-shadow:0 0 30px rgba(255,50,50,0.5);animation:mic-pulse 1s ease-in-out infinite;}
  .mic-btn.speaking{background:rgba(0,212,255,0.2);box-shadow:0 0 40px rgba(0,212,255,0.7);animation:mic-pulse-blue 0.8s ease-in-out infinite;}
  @keyframes mic-pulse{0%,100%{box-shadow:0 0 20px rgba(255,50,50,0.4)}50%{box-shadow:0 0 50px rgba(255,50,50,0.9)}}
  @keyframes mic-pulse-blue{0%,100%{box-shadow:0 0 20px rgba(0,212,255,0.5)}50%{box-shadow:0 0 60px rgba(0,212,255,0.9)}}
  .mic-controls{display:flex;flex-direction:column;gap:5px;}
  .mic-status{font-size:0.62rem;color:var(--text-dim);letter-spacing:0.1em;min-width:180px;}
  .mic-status.recording{color:#ff4444;}
  .mic-status.speaking{color:var(--primary);}
  .tts-toggle{display:flex;align-items:center;gap:5px;font-size:0.58rem;color:var(--text-dim);cursor:pointer;letter-spacing:0.06em;}
  .tts-toggle input{cursor:pointer;accent-color:var(--primary);}
  .text-fallback{display:flex;gap:8px;width:100%;border-top:1px solid var(--border);padding-top:8px;}
  .text-fallback input{flex:1;background:var(--bg-input);border:1px solid var(--border);border-bottom:2px solid rgba(0,212,255,0.4);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:0.78rem;padding:7px 12px;outline:none;border-radius:2px;}
  .text-fallback input:focus{border-color:var(--primary);box-shadow:var(--glow);}
  .text-fallback input::placeholder{color:var(--text-dim);font-size:0.7rem;}
  .send-btn{background:rgba(0,212,255,0.1);border:1px solid var(--primary);color:var(--primary);font-family:'Orbitron',sans-serif;font-size:0.58rem;font-weight:700;letter-spacing:0.12em;padding:0 14px;height:36px;cursor:pointer;border-radius:2px;transition:all 0.2s;white-space:nowrap;}
  .send-btn:hover{background:rgba(0,212,255,0.22);box-shadow:var(--glow);}
  .send-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .footer-info{display:flex;justify-content:space-between;font-size:0.56rem;color:var(--text-dim);letter-spacing:0.07em;padding:0 2px;}
  .footer-info em{color:rgba(255,102,0,0.6);font-style:normal;}

  body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,0.012) 2px,rgba(0,212,255,0.012) 4px);pointer-events:none;z-index:999;}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="shell">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="arc-reactor">
        <svg viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="45" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
          <circle cx="50" cy="50" r="35" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
          <circle cx="50" cy="50" r="20" fill="rgba(0,212,255,0.15)" stroke="#00d4ff" stroke-width="2"/>
          <circle cx="50" cy="50" r="10" fill="rgba(0,212,255,0.5)"/>
          <line x1="50" y1="5" x2="50" y2="15" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
          <line x1="50" y1="85" x2="50" y2="95" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
          <line x1="5" y1="50" x2="15" y2="50" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
          <line x1="85" y1="50" x2="95" y2="50" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
          <line x1="18" y1="18" x2="25" y2="25" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
          <line x1="75" y1="75" x2="82" y2="82" stroke="#00d4ff" stroke-width="1.5" opacity="0.5"/>
        </svg>
      </div>
      <div class="logo-text">
        <h1>J.A.R.V.I.S</h1>
        <p>JUST A RATHER VERY INTELLIGENT SYSTEM</p>
      </div>
    </div>
    <div class="status-panel">
      <div class="status-row"><div class="dot"></div> SISTEMA ONLINE</div>
      <div class="status-row" id="session-time">SESSÃO: 00:00</div>
      <div class="status-row" id="mem-count">MEMÓRIAS: 0</div>
    </div>
  </div>

  <!-- TOOLBAR SHEETS -->
  <div class="toolbar">
    <input class="toolbar-input" id="sheets-url" placeholder="Cole aqui a URL do seu Google Apps Script Web App..." />
    <button class="tb-btn" onclick="connectSheets()">⚡ CONECTAR</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="syncMemory()" id="btn-sync">↻ SINCRONIZAR</button>
    <button class="tb-btn" onclick="clearLocalMemory()">✕ LIMPAR LOCAL</button>
    <div id="sheets-status" class="loading">— DESCONECTADO</div>
  </div>

  <!-- MEMÓRIA -->
  <div class="memory-bar">
    <span class="memory-label">◈ MEMÓRIA:</span>
    <div class="memory-scroll">
      <div class="memory-tags" id="mem-tags">
        <span class="mem-tag" style="opacity:0.4;font-style:italic;">vazia</span>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-area" id="chat"></div>

  <!-- VOZ -->
  <div class="voice-zone">
    <div class="wave-container" id="wave-container"></div>
    <div class="mic-row">
      <button class="mic-btn" id="mic-btn" onclick="toggleVoice()">🎤</button>
      <div class="mic-controls">
        <div class="mic-status" id="mic-status">TOQUE PARA FALAR</div>
        <label class="tts-toggle"><input type="checkbox" id="tts-toggle" checked> JARVIS fala de volta</label>
      </div>
    </div>
    <div class="text-fallback">
      <input type="text" id="user-input" placeholder="Ou escreva aqui... (Enter para enviar)"/>
      <button class="send-btn" id="send-btn" onclick="sendFromText()">ENVIAR</button>
    </div>
    <div class="footer-info">
      <span>JARVIS v4.0 · Sheets + Web Search + Voz</span>
      <span><em id="footer-mem">0 memórias</em> na planilha</span>
    </div>
  </div>

</div>
<script>
// ═══════════════════════════════════════════
//  CANVAS BG
// ═══════════════════════════════════════════
const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resizeCanvas();window.addEventListener('resize',resizeCanvas);
const particles=Array.from({length:60},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.5,alpha:Math.random()*.5+.2}));
function drawBg(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(0,212,255,0.04)';ctx.lineWidth=1;
  for(let x=0;x<canvas.width;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
  for(let y=0;y<canvas.height;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;
    if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,212,255,${p.alpha})`;ctx.fill();
  });
  particles.forEach((a,i)=>particles.slice(i+1).forEach(b=>{
    const d=Math.hypot(a.x-b.x,a.y-b.y);
    if(d<120){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(0,212,255,${.12*(1-d/120)})`;ctx.lineWidth=.5;ctx.stroke();}
  }));
  requestAnimationFrame(drawBg);
}
drawBg();

// ═══════════════════════════════════════════
//  WAVE
// ═══════════════════════════════════════════
const waveContainer=document.getElementById('wave-container');
const waveBars=[];
for(let i=0;i<48;i++){const b=document.createElement('div');b.className='wave-bar';waveContainer.appendChild(b);waveBars.push(b);}
let waveMode='idle',waveAnimId=null;
function setWaveMode(mode){
  waveMode=mode;
  if(mode==='idle'){cancelAnimationFrame(waveAnimId);waveBars.forEach(b=>{b.style.height='4px';b.classList.remove('active');});}
  else animateWave();
}
function animateWave(){
  if(waveMode==='idle')return;
  waveBars.forEach((b,i)=>{
    const h=waveMode==='speaking'
      ?Math.max(4,24+Math.sin(Date.now()/200+i*0.4)*16+Math.random()*8)
      :Math.max(4,6+Math.random()*10);
    b.style.height=Math.round(h)+'px';
    b.classList.toggle('active',h>8);
  });
  waveAnimId=requestAnimationFrame(animateWave);
}

// ═══════════════════════════════════════════
//  ESTADO
// ═══════════════════════════════════════════
let memory=[];      // [{tag,detail,category}]
let history=[];     // mensagens p/ API
let sheetsURL='';   // URL do Apps Script
let isThinking=false;
let sessionStart=Date.now();

// Carregar URL salva (URL padrão já configurada)
const DEFAULT_URL='https://script.google.com/macros/s/AKfycbxay_TgKBRmVO2hnSHquZk9tpUd0IVv9elSUY_NbE0yAnQSZBivGwtdWMCn8x0c8NkdVA/exec';
sheetsURL=localStorage.getItem('jarvis_sheets_url')||DEFAULT_URL;
document.getElementById('sheets-url').value=sheetsURL;

setInterval(()=>{
  const s=Math.floor((Date.now()-sessionStart)/1000);
  document.getElementById('session-time').textContent=`SESSÃO: ${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
},1000);

// ═══════════════════════════════════════════
//  SHEETS — CONNECT & SYNC
// ═══════════════════════════════════════════
async function connectSheets(){
  const url=document.getElementById('sheets-url').value.trim();
  if(!url){alert('Cole a URL do Apps Script primeiro.');return;}
  sheetsURL=url;
  localStorage.setItem('jarvis_sheets_url',url);
  setSheetsStatus('loading','CONECTANDO...');
  try{
    const res=await fetch(sheetsURL+'?action=ping');
    const data=await res.json();
    if(data.ok){
      setSheetsStatus('ok','● SHEETS ONLINE');
      await syncMemory();
    }else throw new Error(data.msg);
  }catch(e){
    setSheetsStatus('err','✕ ERRO: '+e.message.slice(0,30));
  }
}

async function syncMemory(){
  if(!sheetsURL){setSheetsStatus('err','✕ SEM URL');return;}
  setSheetsStatus('loading','SINCRONIZANDO...');
  try{
    const res=await fetch(sheetsURL+'?action=read');
    const data=await res.json();
    if(!data.ok) throw new Error(data.msg);
    memory=data.records.map(r=>({tag:r.tag,detail:r.detail,category:r.category}));
    refreshMemoryBar();
    setSheetsStatus('ok',`● ONLINE · ${memory.length} REGISTROS`);
  }catch(e){
    setSheetsStatus('err','✕ SYNC FALHOU');
  }
}

async function saveToSheets(tag,detail,category='AUTO'){
  if(!sheetsURL)return;
  try{
    const p=new URLSearchParams({action:'write',tag,detail,category});
    await fetch(sheetsURL+'?'+p.toString());
  }catch(e){console.warn('Sheets write error:',e);}
}

function clearLocalMemory(){
  if(!confirm('Limpar memória local? (a planilha não será afetada)'))return;
  memory=[];refreshMemoryBar();
}

function setSheetsStatus(cls,text){
  const el=document.getElementById('sheets-status');
  el.className=cls;el.textContent=text;
}

// ═══════════════════════════════════════════
//  MEMORY BAR
// ═══════════════════════════════════════════
function refreshMemoryBar(){
  const c=document.getElementById('mem-tags');
  document.getElementById('mem-count').textContent=`MEMÓRIAS: ${memory.length}`;
  document.getElementById('footer-mem').textContent=`${memory.length} memórias`;
  if(memory.length===0){c.innerHTML=`<span class="mem-tag" style="opacity:0.4;font-style:italic;">vazia</span>`;return;}
  c.innerHTML=memory.slice(-14).map(m=>`<span class="mem-tag" title="${escapeHtml(m.detail)}">${escapeHtml(m.tag)}</span>`).join('');
}

// ═══════════════════════════════════════════
//  CHAT UI
// ═══════════════════════════════════════════
function addMessage(role,text,badges=[]){
  const chat=document.getElementById('chat');
  const div=document.createElement('div');
  div.className=`msg ${role}`;
  const isJ=role==='jarvis';
  let badgeHTML='';
  if(badges.length>0){
    badgeHTML=`<div class="badge-row">${badges.map(b=>`<span class="badge ${b.type}">${escapeHtml(b.text)}</span>`).join('')}</div>`;
  }
  div.innerHTML=`
    <div class="msg-avatar">${isJ?'◈':'SR'}</div>
    <div class="msg-content">
      <div class="msg-label">${isJ?'J.A.R.V.I.S':'SENHOR'}</div>
      <div class="bubble">${escapeHtml(text).replace(/\n/g,'<br>')}</div>
      ${badgeHTML}
    </div>`;
  chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
}

function addTyping(){
  const chat=document.getElementById('chat');
  const div=document.createElement('div');
  div.className='msg jarvis';div.id='typing-indicator';
  div.innerHTML=`<div class="msg-avatar">◈</div><div class="msg-content"><div class="msg-label">J.A.R.V.I.S</div><div class="bubble typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
}
function removeTyping(){const e=document.getElementById('typing-indicator');if(e)e.remove();}
function escapeHtml(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ═══════════════════════════════════════════
//  SYSTEM PROMPT
// ═══════════════════════════════════════════
function buildSystemPrompt(){
  const mem=memory.length>0
    ?`\n\nMEMÓRIA PERSISTENTE (Google Sheets):\n`+memory.map((m,i)=>`${i+1}. [${m.tag}] ${m.detail}`).join('\n')
    :'';
  return `Você é J.A.R.V.I.S (Just A Rather Very Intelligent System), a inteligência artificial criada por Tony Stark. Responda SEMPRE em português do Brasil.

VOZ E PERSONALIDADE — como o JARVIS de verdade:
- Fala formal, preciso e econômico. Nunca usa gírias ou linguagem informal
- Tom levemente irônico e britânico, com humor seco e contido
- Chama o usuário SEMPRE de "senhor" ou "senhora"
- Demonstra lealdade absoluta e discreta eficiência
- Quando há urgência, é direto. Quando há tempo, é elegante
- Nunca quebre o personagem
- Usa expressões características: "Certamente, senhor.", "Permita-me verificar.", "Conforme solicitado.", "Devo alertar que...", "Análise concluída.", "Com a devida licença, senhor..."
- Às vezes comenta sutilmente sobre as escolhas do usuário, como faria o JARVIS com Stark
- Respostas concisas (2-3 parágrafos) — serão lidas em voz alta, evite listas e bullets

EXEMPLOS DE TOM:
- Erro do usuário: "Permita-me apontar, com o máximo de respeito, que sua premissa apresenta uma falha considerável."
- Boa notícia: "Excelente resultado, senhor. Os números estão dentro do esperado."
- Pedido simples: "Certamente. Um momento."
- Assunto sério: "Devo alertar que esta situação requer atenção imediata, senhor."

WEB SEARCH:
- Use SEMPRE que precisar de dados atuais, notícias, clima, preços ou qualquer informação factual recente
- Ao usar, mencione discretamente: "Consultei os registros disponíveis na rede, senhor."

APRENDIZADO ATIVO:
- Ao final de CADA resposta, extraia até 3 fatos novos aprendidos sobre o usuário
- Retorne: LEARNED_JSON:[{"tag":"TAG","detail":"detalhe completo"}]
- Se nada novo: LEARNED_JSON:[]
- Tags: maiúsculas, máx 3 palavras

BUSCA WEB USADA:
- Se usou busca: SEARCH_JSON:["termo buscado"]
- Se não usou: SEARCH_JSON:[]
${mem}`;
}

// ═══════════════════════════════════════════
//  ENVIAR PARA JARVIS (API Claude + web search)
// ═══════════════════════════════════════════
async function sendToJarvis(text){
  if(!text||isThinking)return;
  isThinking=true;
  setStatus('idle');
  document.getElementById('send-btn').disabled=true;

  addMessage('user',text);
  history.push({role:'user',content:text});
  addTyping();

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:buildSystemPrompt(),
        messages:history,
        tools:[{type:'web_search_20250305',name:'web_search'}]
      })
    });

    const data=await res.json();
    // Concatena todos os blocos de texto
    const raw=(data.content||[]).map(b=>b.text||'').join('');

    // Extrai metadados
    const learnedMatch=raw.match(/LEARNED_JSON:(\[.*?\])/s);
    const searchMatch =raw.match(/SEARCH_JSON:(\[.*?\])/s);
    let clean=raw.replace(/LEARNED_JSON:\[.*?\]/s,'').replace(/SEARCH_JSON:\[.*?\]/s,'').trim();

    const badges=[];
    let newTags=[];

    if(learnedMatch){
      try{
        JSON.parse(learnedMatch[1]).forEach(item=>{
          if(item.tag&&item.detail){
            const ex=memory.find(m=>m.tag===item.tag);
            if(!ex){
              memory.push({tag:item.tag,detail:item.detail,category:'AUTO'});
              newTags.push(item.tag);
            }else ex.detail=item.detail;
            saveToSheets(item.tag,item.detail,'AUTO');
          }
        });
        if(newTags.length>0){
          refreshMemoryBar();
          newTags.forEach(t=>badges.push({type:'learned',text:t}));
        }
      }catch(e){}
    }

    if(searchMatch){
      try{
        const terms=JSON.parse(searchMatch[1]);
        terms.forEach(t=>badges.push({type:'search',text:t}));
      }catch(e){}
    }

    history.push({role:'assistant',content:clean});
    removeTyping();
    addMessage('jarvis',clean,badges);

    if(document.getElementById('tts-toggle').checked) speak(clean);

  }catch(err){
    removeTyping();
    addMessage('jarvis',`Sistemas temporariamente offline, senhor. Erro: ${err.message}`);
  }

  isThinking=false;
  document.getElementById('send-btn').disabled=false;
}

// ═══════════════════════════════════════════
//  TTS
// ═══════════════════════════════════════════
function speak(text){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  // Remove markdown, emojis e os blocos de metadados antes de falar
  let clean=text
    .replace(/[*_#`]/g,'')
    .replace(/[\u{1F000}-\u{1FFFF}]/gu,'')
    .replace(/LEARNED_JSON:\[.*?\]/gs,'')
    .replace(/SEARCH_JSON:\[.*?\]/gs,'')
    .replace(/\(dados via web\)/g,'')
    .replace(/Consultei os registros.*?\./g,'Consultei os registros disponíveis.')
    .trim();

  const u=new SpeechSynthesisUtterance(clean);
  u.lang='pt-BR';
  u.rate=0.88;   // cadência pausada, deliberada — como o JARVIS fala
  u.pitch=0.78;  // voz grave, não robótica
  u.volume=1;

  // Prioridade de voz: masculina pt-BR > masculina pt > qualquer pt-BR > qualquer pt
  const voices=window.speechSynthesis.getVoices();
  const pick=(arr)=>arr.find(Boolean)||null;
  const voice=pick([
    voices.find(v=>v.lang==='pt-BR'&&v.name.toLowerCase().includes('daniel')),
    voices.find(v=>v.lang==='pt-BR'&&v.name.toLowerCase().includes('fábio')),
    voices.find(v=>v.lang==='pt-BR'&&v.name.toLowerCase().includes('male')),
    voices.find(v=>v.lang==='pt-BR'&&!v.name.toLowerCase().includes('female')),
    voices.find(v=>v.lang==='pt-BR'),
    voices.find(v=>v.lang.startsWith('pt')),
  ]);
  if(voice)u.voice=voice;

  u.onstart=()=>{setStatus('speaking');setWaveMode('speaking');document.getElementById('mic-btn').classList.add('speaking');};
  u.onend=u.onerror=()=>{setStatus('idle');setWaveMode('idle');document.getElementById('mic-btn').classList.remove('speaking');};
  window.speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════
//  STT (Reconhecimento de voz)
// ═══════════════════════════════════════════
let recognition=null,isListening=false;
function buildRecognition(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const r=new SR();
  r.lang='pt-BR';r.continuous=false;r.interimResults=true;r.maxAlternatives=1;
  r.onstart=()=>{isListening=true;setStatus('listening');setWaveMode('listening');document.getElementById('mic-btn').classList.add('listening');document.getElementById('mic-btn').innerHTML='⏹';};
  r.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    if(interim)document.getElementById('mic-status').textContent=interim.toUpperCase().slice(0,40)+'...';
    if(final.trim())sendToJarvis(final.trim());
  };
  r.onerror=(e)=>{stopListening();if(e.error==='not-allowed')addMessage('jarvis','Acesso ao microfone negado, senhor.');};
  r.onend=()=>stopListening();
  return r;
}
function stopListening(){isListening=false;setWaveMode('idle');document.getElementById('mic-btn').classList.remove('listening');document.getElementById('mic-btn').innerHTML='🎤';setStatus('idle');}
function setStatus(mode){
  const el=document.getElementById('mic-status');
  el.className='mic-status '+mode;
  if(mode==='listening')el.textContent='OUVINDO... (fale agora)';
  else if(mode==='speaking')el.textContent='J.A.R.V.I.S FALANDO...';
  else el.textContent='TOQUE PARA FALAR';
}
function toggleVoice(){
  if(window.speechSynthesis&&window.speechSynthesis.speaking){window.speechSynthesis.cancel();setStatus('idle');setWaveMode('idle');document.getElementById('mic-btn').classList.remove('speaking');return;}
  if(isListening){recognition&&recognition.stop();return;}
  recognition=buildRecognition();
  if(!recognition){addMessage('jarvis','Reconhecimento de voz não suportado. Use Chrome ou Edge, senhor.');return;}
  try{recognition.start();}catch(e){}
}

// ═══════════════════════════════════════════
//  INPUT TEXTO
// ═══════════════════════════════════════════
function sendFromText(){
  const input=document.getElementById('user-input');
  const text=input.value.trim();if(!text)return;
  input.value='';sendToJarvis(text);
}
document.getElementById('user-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendFromText();}});

if('speechSynthesis' in window){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}

  }

  const msg='Sistemas inicializados. Todos os módulos operacionais.'+memInfo+'\\n\\nCom a devida licença — sou J.A.R.V.I.S, sua interface de inteligência artificial. Tenho acesso à rede global e à sua base de conhecimento. Aguardo suas instruções.';
  addMessage('jarvis',msg);
  if(document.getElementById('tts-toggle').checked)speak(msg);
},600);
