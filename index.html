<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>J.A.R.V.I.S</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --primary:#00d4ff; --accent:#ff6600;
    --bg:#020a12; --panel:rgba(0,20,40,0.9);
    --text:#b8e4f5; --dim:#5a8fa8;
    --glow:0 0 16px rgba(0,212,255,0.5);
    --border:rgba(0,212,255,0.2);
    --fs:14px; /* base font — controlado por uma variável */
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    height:100%; width:100%;
    background:var(--bg);
    font-family:'Share Tech Mono',monospace;
    font-size:var(--fs);
    color:var(--text);
    overflow:hidden;
  }

  #bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

  /* ── SHELL ── */
  .shell {
    position:relative; z-index:1;
    display:flex; flex-direction:column;
    height:100%; max-width:480px;   /* largura de celular */
    margin:0 auto;
    padding:10px 10px 6px;
    gap:6px;
  }

  /* ── HEADER ── */
  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding-bottom:8px; border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .logo { display:flex; align-items:center; gap:8px; }
  .arc { width:32px; height:32px; flex-shrink:0; }
  .arc svg { width:100%; height:100%; animation:spin 6s linear infinite; filter:drop-shadow(0 0 6px var(--primary)); }
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .logo h1 { font-family:'Orbitron',sans-serif; font-size:0.85rem; font-weight:900; color:var(--primary); letter-spacing:.25em; text-shadow:var(--glow); }
  .logo p  { font-size:0.45rem; color:var(--dim); letter-spacing:.15em; margin-top:1px; }
  .status { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
  .srow   { display:flex; align-items:center; gap:4px; font-size:0.5rem; color:var(--dim); letter-spacing:.08em; }
  .dot    { width:5px; height:5px; border-radius:50%; background:#00ff88; box-shadow:0 0 5px #00ff88; animation:blink 2s infinite; }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  /* ── SHEETS TOOLBAR ── */
  .toolbar {
    display:flex; gap:5px; align-items:center; flex-shrink:0; flex-wrap:wrap;
  }
  .toolbar input {
    flex:1; min-width:0;
    background:rgba(0,20,40,.8); border:1px solid var(--border);
    color:var(--dim); font-family:'Share Tech Mono',monospace;
    font-size:0.55rem; padding:5px 8px; border-radius:3px; outline:none;
  }
  .toolbar input:focus { border-color:var(--primary); }
  .tbtn {
    background:rgba(0,212,255,.07); border:1px solid var(--border);
    color:var(--dim); font-family:'Share Tech Mono',monospace;
    font-size:0.52rem; letter-spacing:.08em;
    padding:5px 8px; border-radius:3px; cursor:pointer; white-space:nowrap;
    transition:all .15s;
  }
  .tbtn:hover,.tbtn:active { background:rgba(0,212,255,.18); color:var(--primary); border-color:var(--primary); }
  #sst {
    font-size:0.5rem; padding:3px 7px; border-radius:3px;
    border:1px solid var(--border); white-space:nowrap;
  }
  #sst.ok  { color:#00ff88; border-color:rgba(0,255,136,.3); background:rgba(0,255,136,.05); }
  #sst.err { color:#ff4444; border-color:rgba(255,68,68,.3); }
  #sst.loading { color:var(--dim); }

  /* ── MEMÓRIA ── */
  .membar {
    display:flex; align-items:center; gap:6px;
    padding:4px 10px; background:var(--panel);
    border:1px solid var(--border); border-radius:3px;
    font-size:0.52rem; overflow:hidden; white-space:nowrap; flex-shrink:0;
  }
  .memlabel { color:var(--primary); flex-shrink:0; }
  .memscroll { flex:1; overflow:hidden; }
  .memtags { display:flex; gap:5px; }
  .mtag {
    background:rgba(0,212,255,.1); border:1px solid rgba(0,212,255,.3);
    border-radius:2px; padding:1px 6px; color:var(--primary);
    font-size:0.5rem; white-space:nowrap; cursor:pointer;
  }

  /* ── CHAT ── */
  .chat {
    flex:1; overflow-y:auto; display:flex; flex-direction:column;
    gap:10px; padding-right:2px;
    scrollbar-width:thin; scrollbar-color:rgba(0,136,204,.4) transparent;
  }
  .chat::-webkit-scrollbar { width:2px; }
  .chat::-webkit-scrollbar-thumb { background:rgba(0,136,204,.4); }

  .msg { display:flex; gap:7px; animation:min .25s ease; }
  @keyframes min{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .msg.user { flex-direction:row-reverse; }

  .ava {
    width:26px; height:26px; border-radius:50%;
    border:1px solid var(--border); flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:0.6rem; background:var(--panel);
  }
  .msg.jarvis .ava { color:var(--primary); border-color:var(--primary); box-shadow:0 0 8px rgba(0,212,255,.3); }
  .msg.user   .ava { color:var(--accent);  border-color:var(--accent);  box-shadow:0 0 8px rgba(255,102,0,.3);  }

  .mcontent { max-width:84%; display:flex; flex-direction:column; gap:2px; }
  .mlabel { font-size:0.48rem; letter-spacing:.12em; color:var(--dim); }
  .msg.user .mlabel { text-align:right; color:rgba(255,102,0,.6); }

  .bubble { padding:8px 11px; border-radius:2px; font-size:0.75rem; line-height:1.55; }
  .msg.jarvis .bubble { background:var(--panel); border:1px solid var(--border); border-left:2px solid var(--primary); }
  .msg.user   .bubble { background:rgba(255,102,0,.08); border:1px solid rgba(255,102,0,.2); border-right:2px solid var(--accent); color:#f0c9a0; text-align:right; }
  .bubble.typing { display:flex; align-items:center; gap:4px; min-height:32px; }
  .tdot { width:5px; height:5px; border-radius:50%; background:var(--primary); animation:tb 1.2s ease-in-out infinite; }
  .tdot:nth-child(2){animation-delay:.2s}.tdot:nth-child(3){animation-delay:.4s}
  @keyframes tb{0%,80%,100%{transform:translateY(0);opacity:.3}40%{transform:translateY(-5px);opacity:1}}

  .badges { display:flex; flex-wrap:wrap; gap:4px; margin-top:2px; }
  .badge  { font-size:0.48rem; padding:1px 6px; border-radius:2px; letter-spacing:.07em; }
  .badge.learned { color:#00ff88; border:1px solid rgba(0,255,136,.3); background:rgba(0,255,136,.06); }
  .badge.search  { color:#ffcc00; border:1px solid rgba(255,204,0,.3); background:rgba(255,204,0,.06); }

  /* ── ZONA DE VOZ ── */
  .voicezone { display:flex; flex-direction:column; align-items:center; gap:6px; flex-shrink:0; padding-top:4px; }

  .wavebox {
    width:100%; height:36px;
    display:flex; align-items:center; justify-content:center; gap:2px;
  }
  .wbar {
    width:2px; border-radius:1px; background:var(--primary);
    opacity:.25; height:3px; transition:height .08s ease, opacity .1s;
  }
  .wbar.on { opacity:.85; box-shadow:0 0 4px var(--primary); }

  .microw { display:flex; align-items:center; gap:12px; }
  .micbtn {
    width:52px; height:52px; border-radius:50%;
    background:rgba(0,212,255,.08); border:2px solid var(--primary);
    color:var(--primary); font-size:1.3rem;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all .2s;
    box-shadow:0 0 14px rgba(0,212,255,.2);
  }
  .micbtn:active,.micbtn:hover { background:rgba(0,212,255,.2); box-shadow:var(--glow); }
  .micbtn.listening { border-color:#ff4444; color:#ff4444; background:rgba(255,50,50,.12); animation:rp 1s ease-in-out infinite; }
  .micbtn.speaking  { box-shadow:0 0 30px rgba(0,212,255,.8); animation:bp .8s ease-in-out infinite; }
  @keyframes rp{0%,100%{box-shadow:0 0 12px rgba(255,50,50,.4)}50%{box-shadow:0 0 35px rgba(255,50,50,.9)}}
  @keyframes bp{0%,100%{box-shadow:0 0 14px rgba(0,212,255,.5)}50%{box-shadow:0 0 45px rgba(0,212,255,.95)}}

  .micinfo { display:flex; flex-direction:column; gap:4px; }
  .micst { font-size:0.55rem; color:var(--dim); letter-spacing:.1em; }
  .micst.recording { color:#ff4444; }
  .micst.speaking  { color:var(--primary); }
  .ttstoggle { display:flex; align-items:center; gap:5px; font-size:0.52rem; color:var(--dim); cursor:pointer; }
  .ttstoggle input { accent-color:var(--primary); cursor:pointer; }

  .textrow {
    display:flex; gap:6px; width:100%;
    border-top:1px solid var(--border); padding-top:6px;
  }
  .textrow input {
    flex:1; background:rgba(0,40,70,.7); border:1px solid var(--border);
    border-bottom:2px solid rgba(0,212,255,.35);
    color:var(--text); font-family:'Share Tech Mono',monospace;
    font-size:0.72rem; padding:7px 10px; outline:none; border-radius:2px;
  }
  .textrow input:focus { border-color:var(--primary); }
  .textrow input::placeholder { color:var(--dim); font-size:0.65rem; }
  .sendbtn {
    background:rgba(0,212,255,.1); border:1px solid var(--primary);
    color:var(--primary); font-family:'Orbitron',sans-serif;
    font-size:0.52rem; font-weight:700; letter-spacing:.12em;
    padding:0 12px; height:34px; cursor:pointer; border-radius:2px;
    transition:all .2s; white-space:nowrap;
  }
  .sendbtn:hover,.sendbtn:active { background:rgba(0,212,255,.22); box-shadow:var(--glow); }
  .sendbtn:disabled { opacity:.4; cursor:not-allowed; }

  .footer {
    display:flex; justify-content:space-between;
    font-size:0.48rem; color:var(--dim); letter-spacing:.06em; padding:0 1px;
  }
  .footer em { color:rgba(255,102,0,.6); font-style:normal; }

  /* scanlines */
  body::after {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:999;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,.01) 2px,rgba(0,212,255,.01) 4px);
  }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="shell">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="arc">
        <svg viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="45" stroke="#00d4ff" stroke-width="1.5" opacity=".35"/>
          <circle cx="50" cy="50" r="33" stroke="#00d4ff" stroke-width="1" opacity=".55"/>
          <circle cx="50" cy="50" r="18" fill="rgba(0,212,255,.12)" stroke="#00d4ff" stroke-width="2"/>
          <circle cx="50" cy="50" r="8"  fill="rgba(0,212,255,.55)"/>
          <line x1="50" y1="5"  x2="50" y2="14" stroke="#00d4ff" stroke-width="2" opacity=".8"/>
          <line x1="50" y1="86" x2="50" y2="95" stroke="#00d4ff" stroke-width="2" opacity=".8"/>
          <line x1="5"  y1="50" x2="14" y2="50" stroke="#00d4ff" stroke-width="2" opacity=".8"/>
          <line x1="86" y1="50" x2="95" y2="50" stroke="#00d4ff" stroke-width="2" opacity=".8"/>
        </svg>
      </div>
      <div>
        <h1>J.A.R.V.I.S</h1>
        <p>JUST A RATHER VERY INTELLIGENT SYSTEM</p>
      </div>
    </div>
    <div class="status">
      <div class="srow"><div class="dot"></div>ONLINE</div>
      <div class="srow" id="stime">00:00</div>
      <div class="srow" id="smem">MEM: 0</div>
    </div>
  </div>

  <!-- SHEETS TOOLBAR -->
  <div class="toolbar">
    <input id="surl" placeholder="URL do Apps Script..." />
    <button class="tbtn" onclick="connectSheets()">⚡ CONECTAR</button>
    <button class="tbtn" onclick="syncMemory()">↻ SYNC</button>
    <div id="sst" class="loading">OFFLINE</div>
  </div>

  <!-- MEMÓRIA -->
  <div class="membar">
    <span class="memlabel">◈ MEM:</span>
    <div class="memscroll">
      <div class="memtags" id="memtags">
        <span class="mtag" style="opacity:.4;font-style:italic">vazia</span>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat" id="chat"></div>

  <!-- VOZ -->
  <div class="voicezone">
    <div class="wavebox" id="wavebox"></div>
    <div class="microw">
      <button class="micbtn" id="micbtn" onclick="toggleVoice()">🎤</button>
      <div class="micinfo">
        <div class="micst" id="micst">TOQUE PARA FALAR</div>
        <label class="ttstoggle">
          <input type="checkbox" id="ttstgl" checked> JARVIS fala de volta
        </label>
      </div>
    </div>
    <div class="textrow">
      <input type="text" id="txtin" placeholder="Ou escreva aqui... (Enter)"/>
      <button class="sendbtn" id="sendbtn" onclick="sendText()">ENVIAR</button>
    </div>
    <div class="footer">
      <span>JARVIS v4.1 · Sheets + Web + Voz</span>
      <span><em id="fmem">0 memórias</em></span>
    </div>
  </div>

</div>
<script>
// ── CANVAS BG ──────────────────────────────────────────
const cv=document.getElementById('bg-canvas'),cx=cv.getContext('2d');
function rsz(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
rsz();window.addEventListener('resize',rsz);
const pts=Array.from({length:50},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.2+.4,a:Math.random()*.4+.15}));
function drawBg(){
  cx.clearRect(0,0,cv.width,cv.height);
  cx.strokeStyle='rgba(0,212,255,0.035)';cx.lineWidth=1;
  for(let x=0;x<cv.width;x+=55){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,cv.height);cx.stroke();}
  for(let y=0;y<cv.height;y+=55){cx.beginPath();cx.moveTo(0,y);cx.lineTo(cv.width,y);cx.stroke();}
  pts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=cv.width;if(p.x>cv.width)p.x=0;
    if(p.y<0)p.y=cv.height;if(p.y>cv.height)p.y=0;
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);
    cx.fillStyle=`rgba(0,212,255,${p.a})`;cx.fill();
  });
  pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{
    const d=Math.hypot(a.x-b.x,a.y-b.y);
    if(d<100){cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(b.x,b.y);
      cx.strokeStyle=`rgba(0,212,255,${.1*(1-d/100)})`;cx.lineWidth=.4;cx.stroke();}
  }));
  requestAnimationFrame(drawBg);
}
drawBg();

// ── WAVE BARS ──────────────────────────────────────────
const wb=document.getElementById('wavebox');
const bars=[];
for(let i=0;i<44;i++){const b=document.createElement('div');b.className='wbar';wb.appendChild(b);bars.push(b);}
let wmode='idle',wraf=null;
function setWave(m){
  wmode=m;
  if(m==='idle'){cancelAnimationFrame(wraf);bars.forEach(b=>{b.style.height='3px';b.classList.remove('on');});}
  else animWave();
}
function animWave(){
  if(wmode==='idle')return;
  bars.forEach((b,i)=>{
    const h=wmode==='speaking'?Math.max(3,20+Math.sin(Date.now()/180+i*.45)*14+Math.random()*6):Math.max(3,4+Math.random()*8);
    b.style.height=Math.round(h)+'px';b.classList.toggle('on',h>6);
  });
  wraf=requestAnimationFrame(animWave);
}

// ── ESTADO ─────────────────────────────────────────────
let memory=[],history=[],isThinking=false,t0=Date.now();
const SHEETS_URL='https://script.google.com/macros/s/AKfycbxay_TgKBRmVO2hnSHquZk9tpUd0IVv9elSUY_NbE0yAnQSZBivGwtdWMCn8x0c8NkdVA/exec';
// ⚠️ Após criar o Cloudflare Worker, substitua a URL abaixo
const WORKER_URL='https://jarvis-proxy.gabriel-serejo290.workers.dev';
let sheetsURL=localStorage.getItem('jarvis_url')||SHEETS_URL;
document.getElementById('surl').value=sheetsURL;

setInterval(()=>{
  const s=Math.floor((Date.now()-t0)/1000);
  document.getElementById('stime').textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
},1000);

// ── SHEETS ─────────────────────────────────────────────
function setSst(cls,txt){const e=document.getElementById('sst');e.className=cls;e.textContent=txt;}

async function connectSheets(){
  const url=document.getElementById('surl').value.trim();
  if(!url)return;
  sheetsURL=url;
  localStorage.setItem('jarvis_url',url);
  setSst('loading','CONECTANDO...');
  try{
    const r=await fetch(sheetsURL+'?action=ping');
    const d=await r.json();
    if(d.ok){setSst('ok','● ONLINE');await syncMemory();}
    else throw new Error(d.msg);
  }catch(e){setSst('err','✕ ERRO');}
}

async function syncMemory(){
  if(!sheetsURL){setSst('err','SEM URL');return;}
  setSst('loading','SYNC...');
  try{
    const r=await fetch(sheetsURL+'?action=read');
    const d=await r.json();
    if(!d.ok)throw new Error(d.msg);
    memory=d.records.map(r=>({tag:r.tag,detail:r.detail}));
    refreshMem();
    setSst('ok',`● ${memory.length} REG`);
  }catch(e){setSst('err','✕ SYNC FALHOU');}
}

async function saveToSheets(tag,detail){
  if(!sheetsURL)return;
  try{
    const p=new URLSearchParams({action:'write',tag,detail,category:'AUTO'});
    await fetch(sheetsURL+'?'+p);
  }catch(e){}
}

function refreshMem(){
  const c=document.getElementById('memtags');
  document.getElementById('smem').textContent=`MEM: ${memory.length}`;
  document.getElementById('fmem').textContent=`${memory.length} memórias`;
  if(!memory.length){c.innerHTML='<span class="mtag" style="opacity:.4;font-style:italic">vazia</span>';return;}
  c.innerHTML=memory.slice(-12).map(m=>`<span class="mtag" title="${esc(m.detail)}">${esc(m.tag)}</span>`).join('');
}

// ── CHAT UI ────────────────────────────────────────────
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function addMsg(role,text,badges=[]){
  const chat=document.getElementById('chat');
  const d=document.createElement('div');d.className='msg '+role;
  const isJ=role==='jarvis';
  let bh=badges.length?`<div class="badges">${badges.map(b=>`<span class="badge ${b.t}">${esc(b.v)}</span>`).join('')}</div>`:'';
  d.innerHTML=`<div class="ava">${isJ?'◈':'SR'}</div>
    <div class="mcontent">
      <div class="mlabel">${isJ?'J.A.R.V.I.S':'SENHOR'}</div>
      <div class="bubble">${esc(text).replace(/\n/g,'<br>')}</div>
      ${bh}
    </div>`;
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}

function addTyping(){
  const chat=document.getElementById('chat');
  const d=document.createElement('div');d.className='msg jarvis';d.id='typing';
  d.innerHTML='<div class="ava">◈</div><div class="mcontent"><div class="mlabel">J.A.R.V.I.S</div><div class="bubble typing"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div></div>';
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}
function rmTyping(){const e=document.getElementById('typing');if(e)e.remove();}

// ── SYSTEM PROMPT ──────────────────────────────────────
function buildPrompt(){
  const mem=memory.length
    ?'\n\nMEMÓRIA PERSISTENTE (Google Sheets):\n'+memory.map((m,i)=>`${i+1}. [${m.tag}] ${m.detail}`).join('\n')
    :'';
  return `Você é J.A.R.V.I.S (Just A Rather Very Intelligent System), a inteligência artificial criada por Tony Stark. Responda SEMPRE em português do Brasil.

VOZ E PERSONALIDADE:
- Fala formal, preciso, econômico. Zero gírias ou informalidade
- Tom levemente irônico, britânico, humor seco e contido
- Chama SEMPRE de "senhor" ou "senhora"
- Lealdade absoluta, eficiência discreta
- Expressões típicas: "Certamente, senhor.", "Permita-me verificar.", "Conforme solicitado.", "Devo alertar que...", "Análise concluída.", "Com a devida licença, senhor..."
- Comenta sutilmente as escolhas do usuário como faria com Stark
- Respostas curtas (2-3 parágrafos) — serão lidas em voz alta, sem listas ou bullets

WEB SEARCH:
- Use SEMPRE que precisar de dados atuais, notícias, clima, preços, eventos recentes
- Mencione discretamente: "Consultei os registros disponíveis na rede, senhor."

APRENDIZADO:
- Ao final de CADA resposta, extraia até 3 fatos novos sobre o usuário
- Retorne: LEARNED_JSON:[{"tag":"TAG","detail":"detalhe"}]
- Se nada novo: LEARNED_JSON:[]
- Tags: maiúsculas, máx 3 palavras

BUSCA USADA:
- Se pesquisou: SEARCH_JSON:["termo"]
- Se não: SEARCH_JSON:[]
${mem}`;
}

// ── API CALL ───────────────────────────────────────────
async function sendToJarvis(text){
  if(!text||isThinking)return;
  isThinking=true;
  document.getElementById('sendbtn').disabled=true;
  setStatus('idle');
  addMsg('user',text);
  history.push({role:'user',content:text});
  addTyping();

  try{
    const res=await fetch(WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'}, // API key gerenciada pelo Worker
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:1000,
        system:buildPrompt(),messages:history,
        // web search via Gemini grounding (ativado no Worker)
      })
    });
    const data=await res.json();
    const raw=(data.content||[]).map(b=>b.text||'').join('');

    // extrai metadados
    const lm=raw.match(/LEARNED_JSON:(\[.*?\])/s);
    const sm=raw.match(/SEARCH_JSON:(\[.*?\])/s);
    let clean=raw.replace(/LEARNED_JSON:\[.*?\]/s,'').replace(/SEARCH_JSON:\[.*?\]/s,'').trim();

    const badges=[];
    if(lm){
      try{
        JSON.parse(lm[1]).forEach(item=>{
          if(!item.tag||!item.detail)return;
          const ex=memory.find(m=>m.tag===item.tag);
          if(!ex){memory.push({tag:item.tag,detail:item.detail});badges.push({t:'learned',v:item.tag});}
          else ex.detail=item.detail;
          saveToSheets(item.tag,item.detail);
        });
        if(badges.length)refreshMem();
      }catch(e){}
    }
    if(sm){try{JSON.parse(sm[1]).forEach(t=>badges.push({t:'search',v:t}));}catch(e){}}

    history.push({role:'assistant',content:clean});
    rmTyping();
    addMsg('jarvis',clean,badges);
    if(document.getElementById('ttstgl').checked)speak(clean);

  }catch(err){
    rmTyping();
    addMsg('jarvis','Sistemas temporariamente offline, senhor. Erro: '+err.message);
  }
  isThinking=false;
  document.getElementById('sendbtn').disabled=false;
}

// ── TTS ────────────────────────────────────────────────
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const clean=text
    .replace(/[*_#`]/g,'')
    .replace(/[\u{1F000}-\u{1FFFF}]/gu,'')
    .replace(/LEARNED_JSON:\[.*?\]/gs,'')
    .replace(/SEARCH_JSON:\[.*?\]/gs,'')
    .trim();
  const u=new SpeechSynthesisUtterance(clean);
  u.lang='pt-BR';u.rate=0.88;u.pitch=0.78;u.volume=1;
  const vs=window.speechSynthesis.getVoices();
  const v=vs.find(v=>v.lang==='pt-BR'&&!v.name.toLowerCase().includes('female'))
          ||vs.find(v=>v.lang==='pt-BR')
          ||vs.find(v=>v.lang.startsWith('pt'));
  if(v)u.voice=v;
  const mb=document.getElementById('micbtn');
  u.onstart=()=>{setStatus('speaking');setWave('speaking');mb.classList.add('speaking');};
  u.onend=u.onerror=()=>{setStatus('idle');setWave('idle');mb.classList.remove('speaking');};
  window.speechSynthesis.speak(u);
}

// ── STT ────────────────────────────────────────────────
let rec=null,listening=false;
function buildRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const r=new SR();r.lang='pt-BR';r.continuous=false;r.interimResults=true;
  r.onstart=()=>{listening=true;setStatus('listening');setWave('listening');document.getElementById('micbtn').classList.add('listening');document.getElementById('micbtn').textContent='⏹';};
  r.onresult=e=>{
    let interim='',fin='';
    for(let i=e.resultIndex;i<e.results.length;i++)
      e.results[i].isFinal?fin+=e.results[i][0].transcript:interim+=e.results[i][0].transcript;
    if(interim)document.getElementById('micst').textContent=interim.slice(0,38).toUpperCase()+'...';
    if(fin.trim())sendToJarvis(fin.trim());
  };
  r.onerror=e=>{stopListen();if(e.error==='not-allowed')addMsg('jarvis','Acesso ao microfone negado, senhor. Verifique as permissões do navegador.');};
  r.onend=()=>stopListen();
  return r;
}
function stopListen(){listening=false;setWave('idle');const mb=document.getElementById('micbtn');mb.classList.remove('listening');mb.textContent='🎤';setStatus('idle');}
function setStatus(m){
  const e=document.getElementById('micst');e.className='micst '+m;
  e.textContent=m==='listening'?'OUVINDO...':m==='speaking'?'JARVIS FALANDO...':'TOQUE PARA FALAR';
}
function toggleVoice(){
  if(window.speechSynthesis&&window.speechSynthesis.speaking){window.speechSynthesis.cancel();setStatus('idle');setWave('idle');document.getElementById('micbtn').classList.remove('speaking');return;}
  if(listening){rec&&rec.stop();return;}
  rec=buildRec();
  if(!rec){addMsg('jarvis','Reconhecimento de voz indisponível neste navegador, senhor. Recomendo o Chrome.');return;}
  try{rec.start();}catch(e){}
}

// ── INPUT TEXTO ────────────────────────────────────────
function sendText(){
  const i=document.getElementById('txtin');
  const t=i.value.trim();if(!t)return;
  i.value='';sendToJarvis(t);
}
document.getElementById('txtin').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendText();}});

if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}

// ── BOOT ───────────────────────────────────────────────
setTimeout(async()=>{
  if(sheetsURL){
    setSst('loading','CONECTANDO...');
    try{
      const r=await fetch(sheetsURL+'?action=ping');
      const d=await r.json();
      if(d.ok){setSst('ok','● ONLINE');await syncMemory();}
      else setSst('err','✕ ERRO');
    }catch(e){setSst('err','✕ OFFLINE');}
  }
  const memInfo=memory.length
    ? `${memory.length} registros recuperados da memória persistente. Estou devidamente atualizado, senhor.`
    : `Nenhum registro anterior detectado. Começaremos do zero, senhor.`;
  const msg=`Sistemas inicializados. Todos os módulos operacionais. ${memInfo}\n\nCom a devida licença — sou J.A.R.V.I.S, sua interface de inteligência artificial. Tenho acesso à rede global e à sua base de conhecimento. Aguardo suas instruções.`;
  addMsg('jarvis',msg);
  if(document.getElementById('ttstgl').checked)speak(msg);
},400);
</script>
