<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>J.A.R.V.I.S</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --primary:#00d4ff; --accent:#ff6600;
    --bg:#020a12; --panel:rgba(0,20,40,0.9);
    --text:#b8e4f5; --dim:#5a8fa8;
    --glow:0 0 20px rgba(0,212,255,0.6);
    --border:rgba(0,212,255,0.2);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; width:100%; background:var(--bg); font-family:'Share Tech Mono',monospace; color:var(--text); overflow:hidden; }

  #bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

  .shell {
    position:relative; z-index:1;
    display:flex; flex-direction:column;
    height:100%; max-width:480px;
    margin:0 auto; padding:10px 10px 8px;
    gap:6px;
  }

  /* ── HEADER ── */
  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding-bottom:8px; border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .logo { display:flex; align-items:center; gap:8px; }
  .arc { width:30px; height:30px; flex-shrink:0; }
  .arc svg { width:100%; height:100%; animation:spin 6s linear infinite; filter:drop-shadow(0 0 6px var(--primary)); }
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .logo h1 { font-family:'Orbitron',sans-serif; font-size:0.8rem; font-weight:900; color:var(--primary); letter-spacing:.25em; text-shadow:var(--glow); }
  .logo p  { font-size:0.42rem; color:var(--dim); letter-spacing:.12em; margin-top:1px; }
  .status { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
  .srow   { display:flex; align-items:center; gap:4px; font-size:0.48rem; color:var(--dim); letter-spacing:.08em; }
  .dot    { width:5px; height:5px; border-radius:50%; background:#00ff88; box-shadow:0 0 5px #00ff88; animation:blink 2s infinite; }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  /* ── SHEETS TOOLBAR ── */
  .toolbar { display:flex; gap:5px; align-items:center; flex-shrink:0; }
  .toolbar input {
    flex:1; background:rgba(0,20,40,.8); border:1px solid var(--border);
    color:var(--dim); font-family:'Share Tech Mono',monospace;
    font-size:0.5rem; padding:4px 8px; border-radius:3px; outline:none;
  }
  .toolbar input:focus { border-color:var(--primary); }
  .tbtn {
    background:rgba(0,212,255,.07); border:1px solid var(--border);
    color:var(--dim); font-family:'Share Tech Mono',monospace;
    font-size:0.48rem; letter-spacing:.06em;
    padding:4px 8px; border-radius:3px; cursor:pointer; white-space:nowrap; transition:all .15s;
  }
  .tbtn:hover,.tbtn:active { background:rgba(0,212,255,.2); color:var(--primary); border-color:var(--primary); }
  .tbtn.active { background:rgba(0,212,255,.25); color:var(--primary); border-color:var(--primary); box-shadow:0 0 10px rgba(0,212,255,.4); }
  #sst { font-size:0.46rem; padding:3px 6px; border-radius:3px; border:1px solid var(--border); white-space:nowrap; }
  #sst.ok     { color:#00ff88; border-color:rgba(0,255,136,.3); background:rgba(0,255,136,.05); }
  #sst.err    { color:#ff4444; border-color:rgba(255,68,68,.3); }
  #sst.loading{ color:var(--dim); }

  /* ── MEMÓRIA ── */
  .membar {
    display:flex; align-items:center; gap:6px;
    padding:3px 10px; background:var(--panel);
    border:1px solid var(--border); border-radius:3px;
    font-size:0.48rem; overflow:hidden; white-space:nowrap; flex-shrink:0;
  }
  .memlabel { color:var(--primary); flex-shrink:0; }
  .memscroll { flex:1; overflow:hidden; }
  .memtags { display:flex; gap:5px; }
  .mtag { background:rgba(0,212,255,.1); border:1px solid rgba(0,212,255,.3); border-radius:2px; padding:1px 6px; color:var(--primary); font-size:0.46rem; white-space:nowrap; }

  /* ── ÁREA CENTRAL — CÍRCULO JARVIS ── */
  .center {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:20px; position:relative;
  }

  /* Status text acima do círculo */
  .jarvis-status {
    font-family:'Orbitron',sans-serif;
    font-size:0.6rem; letter-spacing:.25em;
    color:var(--dim); text-align:center;
    min-height:16px; transition:color .3s;
  }
  .jarvis-status.listening { color:#00ff88; }
  .jarvis-status.speaking  { color:var(--primary); text-shadow:var(--glow); }
  .jarvis-status.thinking  { color:var(--accent); }

  /* Círculo principal */
  .orb-wrap {
    position:relative;
    width:220px; height:220px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }

  /* Anéis externos pulsantes */
  .ring {
    position:absolute; border-radius:50%;
    border:1px solid rgba(0,212,255,0.15);
    animation:ring-pulse 3s ease-in-out infinite;
  }
  .ring:nth-child(1){ width:220px; height:220px; animation-delay:0s; }
  .ring:nth-child(2){ width:190px; height:190px; animation-delay:.4s; }
  .ring:nth-child(3){ width:160px; height:160px; animation-delay:.8s; border-color:rgba(0,212,255,0.25); }

  @keyframes ring-pulse{
    0%,100%{ opacity:.3; transform:scale(1); }
    50%     { opacity:.8; transform:scale(1.03); }
  }

  .orb-wrap.listening .ring { border-color:rgba(0,255,136,0.3); animation-duration:1s; }
  .orb-wrap.speaking  .ring { border-color:rgba(0,212,255,0.5); animation-duration:.6s; }
  .orb-wrap.thinking  .ring { border-color:rgba(255,102,0,0.3); animation-duration:1.5s; }

  /* Círculo central */
  .orb {
    width:130px; height:130px; border-radius:50%;
    background:radial-gradient(circle at 40% 35%, rgba(0,212,255,0.18), rgba(0,10,25,0.95));
    border:2px solid rgba(0,212,255,0.4);
    box-shadow: 0 0 30px rgba(0,212,255,0.2), inset 0 0 30px rgba(0,212,255,0.05);
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
    transition:box-shadow .3s, border-color .3s;
  }

  .orb-wrap.listening .orb {
    border-color:rgba(0,255,136,0.6);
    box-shadow:0 0 40px rgba(0,255,136,0.4), inset 0 0 20px rgba(0,255,136,0.1);
  }
  .orb-wrap.speaking .orb {
    border-color:rgba(0,212,255,0.8);
    box-shadow:0 0 60px rgba(0,212,255,0.6), inset 0 0 30px rgba(0,212,255,0.15);
  }
  .orb-wrap.thinking .orb {
    border-color:rgba(255,102,0,0.5);
    box-shadow:0 0 40px rgba(255,102,0,0.3), inset 0 0 20px rgba(255,102,0,0.08);
  }

  /* Canvas de onda dentro do círculo */
  #orb-canvas {
    position:absolute; inset:0;
    border-radius:50%;
  }

  /* Ícone central */
  .orb-icon {
    position:relative; z-index:2;
    font-size:2.2rem;
    filter:drop-shadow(0 0 8px var(--primary));
    transition:all .3s;
    user-select:none;
  }

  .orb-wrap.listening .orb-icon { filter:drop-shadow(0 0 12px #00ff88); }
  .orb-wrap.speaking  .orb-icon { filter:drop-shadow(0 0 16px var(--primary)); animation:icon-pulse .6s ease-in-out infinite; }
  .orb-wrap.thinking  .orb-icon { filter:drop-shadow(0 0 10px var(--accent)); animation:icon-spin-slow 2s linear infinite; }

  @keyframes icon-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
  @keyframes icon-spin-slow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  /* Botão contínuo */
  .cont-btn {
    font-family:'Orbitron',sans-serif;
    font-size:0.52rem; letter-spacing:.15em;
    color:var(--dim); background:transparent;
    border:1px solid var(--border);
    padding:5px 18px; border-radius:20px;
    cursor:pointer; transition:all .2s;
  }
  .cont-btn:active,.cont-btn:hover { color:var(--primary); border-color:var(--primary); }
  .cont-btn.active {
    color:var(--primary); border-color:var(--primary);
    background:rgba(0,212,255,.1);
    box-shadow:0 0 14px rgba(0,212,255,.3);
  }

  /* ── INPUT TEXTO (discreto, na base) ── */
  .bottom {
    display:flex; flex-direction:column; gap:5px; flex-shrink:0;
  }
  .textrow {
    display:flex; gap:6px;
    border-top:1px solid rgba(0,212,255,.1); padding-top:6px;
  }
  .textrow input {
    flex:1; background:rgba(0,40,70,.5); border:1px solid rgba(0,212,255,.15);
    border-bottom:1px solid rgba(0,212,255,.3);
    color:var(--text); font-family:'Share Tech Mono',monospace;
    font-size:0.68rem; padding:6px 10px; outline:none; border-radius:2px;
  }
  .textrow input:focus { border-color:var(--primary); }
  .textrow input::placeholder { color:rgba(90,143,168,.4); font-size:0.6rem; }
  .sendbtn {
    background:rgba(0,212,255,.08); border:1px solid rgba(0,212,255,.3);
    color:var(--primary); font-family:'Orbitron',sans-serif;
    font-size:0.48rem; font-weight:700; letter-spacing:.1em;
    padding:0 10px; height:32px; cursor:pointer; border-radius:2px; white-space:nowrap;
  }
  .sendbtn:active { background:rgba(0,212,255,.2); }

  .footer {
    display:flex; justify-content:space-between;
    font-size:0.44rem; color:rgba(90,143,168,.5); letter-spacing:.05em;
  }
  .footer em { color:rgba(255,102,0,.5); font-style:normal; }

  body::after {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:999;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,.008) 2px,rgba(0,212,255,.008) 4px);
  }  body::after {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:999;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,.008) 2px,rgba(0,212,255,.008) 4px);
  }

  /* ── BOTÃO LATERAL ESCONDIDO ── */
  .side-btn {
    position:fixed; left:0; top:50%; transform:translateY(-50%);
    z-index:100;
    width:18px; height:60px;
    background:rgba(0,212,255,.15);
    border:1px solid rgba(0,212,255,.3);
    border-left:none;
    border-radius:0 6px 6px 0;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color:rgba(0,212,255,.6); font-size:0.55rem;
    writing-mode:vertical-rl;
    letter-spacing:.1em;
    transition:all .2s;
  }
  .side-btn:hover { background:rgba(0,212,255,.3); color:var(--primary); width:22px; }

  /* ── MODO IMERSIVO ── */
  .immersive-overlay {
    display:none;
    position:fixed; inset:0; z-index:500;
    background:var(--bg);
    flex-direction:column;
    align-items:center; justify-content:center;
    gap:16px;
  }
  .immersive-overlay.active { display:flex; }

  .immersive-orb-wrap {
    position:relative;
    width:min(80vw,80vh);
    height:min(80vw,80vh);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }

  .immersive-orb-wrap .ring {
    position:absolute; border-radius:50%;
    border:1px solid rgba(0,212,255,0.15);
    animation:ring-pulse 3s ease-in-out infinite;
  }
  .immersive-orb-wrap .ring:nth-child(1){ width:100%; height:100%; animation-delay:0s; }
  .immersive-orb-wrap .ring:nth-child(2){ width:84%; height:84%; animation-delay:.4s; }
  .immersive-orb-wrap .ring:nth-child(3){ width:68%; height:68%; animation-delay:.8s; border-color:rgba(0,212,255,0.25); }

  .immersive-orb-wrap.listening .ring { border-color:rgba(0,255,136,0.3); animation-duration:1s; }
  .immersive-orb-wrap.speaking  .ring { border-color:rgba(0,212,255,0.5); animation-duration:.6s; }
  .immersive-orb-wrap.thinking  .ring { border-color:rgba(255,102,0,0.3); animation-duration:1.5s; }

  .immersive-orb {
    width:55%; height:55%; border-radius:50%;
    background:radial-gradient(circle at 40% 35%, rgba(0,212,255,0.18), rgba(0,10,25,0.95));
    border:2px solid rgba(0,212,255,0.4);
    box-shadow:0 0 40px rgba(0,212,255,0.2), inset 0 0 40px rgba(0,212,255,0.05);
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
    transition:box-shadow .3s, border-color .3s;
  }
  .immersive-orb-wrap.listening .immersive-orb { border-color:rgba(0,255,136,0.6); box-shadow:0 0 60px rgba(0,255,136,0.4); }
  .immersive-orb-wrap.speaking  .immersive-orb { border-color:rgba(0,212,255,0.8); box-shadow:0 0 80px rgba(0,212,255,0.6); }
  .immersive-orb-wrap.thinking  .immersive-orb { border-color:rgba(255,102,0,0.5); box-shadow:0 0 60px rgba(255,102,0,0.3); }

  #imm-canvas { position:absolute; inset:0; border-radius:50%; }

  .immersive-icon {
    position:relative; z-index:2;
    font-size:min(8vw,8vh);
    filter:drop-shadow(0 0 12px var(--primary));
    transition:all .3s;
  }

  .immersive-status {
    font-family:'Orbitron',sans-serif;
    font-size:min(3vw,14px); letter-spacing:.3em;
    color:var(--dim); text-align:center;
  }
  .immersive-status.listening { color:#00ff88; }
  .immersive-status.speaking  { color:var(--primary); text-shadow:var(--glow); }
  .immersive-status.thinking  { color:var(--accent); }

  /* botões imersivos */
  .imm-btns {
    display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
  }
  .imm-btn {
    font-family:'Orbitron',sans-serif; font-size:min(2.5vw,10px);
    letter-spacing:.15em; color:var(--dim);
    background:transparent; border:1px solid var(--border);
    padding:6px 16px; border-radius:20px; cursor:pointer; transition:all .2s;
  }
  .imm-btn:hover,.imm-btn:active { color:var(--primary); border-color:var(--primary); }
  .imm-btn.active { color:var(--primary); border-color:var(--primary); background:rgba(0,212,255,.1); box-shadow:0 0 12px rgba(0,212,255,.3); }

  /* fechar — canto superior direito */
  .imm-close {
    position:absolute; top:16px; right:16px;
    width:36px; height:36px; border-radius:50%;
    background:rgba(0,212,255,.08); border:1px solid var(--border);
    color:var(--dim); font-size:1rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all .2s;
  }
  .imm-close:hover { color:var(--primary); border-color:var(--primary); }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<!-- BOTÃO LATERAL ESCONDIDO -->
<div class="side-btn" onclick="toggleImmersive()" title="Modo Imersivo">▶</div>

<!-- OVERLAY IMERSIVO -->
<div class="immersive-overlay" id="immersive">
  <button class="imm-close" onclick="toggleImmersive()">✕</button>

  <div class="immersive-status" id="imm-status">AGUARDANDO</div>

  <div class="immersive-orb-wrap" id="imm-orbwrap" onclick="toggleVoice()">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="immersive-orb">
      <canvas id="imm-canvas"></canvas>
      <div class="immersive-icon" id="imm-icon">◈</div>
    </div>
  </div>

  <div class="imm-btns">
    <button class="imm-btn" id="imm-contbtn" onclick="toggleContinuous()">🔄 CONTÍNUO</button>
    <button class="imm-btn" id="imm-dictbtn" onclick="toggleDictate()">🎙️ DITADO</button>
  </div>
</div>

<div class="shell">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="arc">
        <svg viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="45" stroke="#00d4ff" stroke-width="1.5" opacity=".3"/>
          <circle cx="50" cy="50" r="32" stroke="#00d4ff" stroke-width="1" opacity=".5"/>
          <circle cx="50" cy="50" r="17" fill="rgba(0,212,255,.1)" stroke="#00d4ff" stroke-width="2"/>
          <circle cx="50" cy="50" r="7" fill="rgba(0,212,255,.6)"/>
          <line x1="50" y1="5" x2="50" y2="13" stroke="#00d4ff" stroke-width="2" opacity=".8"/>
          <line x1="50" y1="87" x2="50" y2="95" stroke="#00d4ff" stroke-width="2" opacity=".8"/>
          <line x1="5" y1="50" x2="13" y2="50" stroke="#00d4ff" stroke-width="2" opacity=".8"/>
          <line x1="87" y1="50" x2="95" y2="50" stroke="#00d4ff" stroke-width="2" opacity=".8"/>
        </svg>
      </div>
      <div>
        <h1>J.A.R.V.I.S</h1>
        <p>JUST A RATHER VERY INTELLIGENT SYSTEM</p>
      </div>
    </div>
    <div class="status">
      <div class="srow"><div class="dot"></div>ONLINE</div>
      <div class="srow" id="stime">00:00</div>
      <div class="srow" id="smem">MEM: 0</div>
    </div>
  </div>

  <!-- SHEETS TOOLBAR -->
  <div class="toolbar">
    <input id="surl" placeholder="URL Apps Script..."/>
    <button class="tbtn" onclick="connectSheets()">⚡</button>
    <button class="tbtn" onclick="syncMemory()">↻</button>
    <div id="sst" class="loading">OFFLINE</div>
  </div>

  <!-- MEMÓRIA -->
  <div class="membar">
    <span class="memlabel">◈ MEM:</span>
    <div class="memscroll">
      <div class="memtags" id="memtags">
        <span class="mtag" style="opacity:.4;font-style:italic">vazia</span>
      </div>
    </div>
  </div>

  <!-- CENTRO — CÍRCULO JARVIS -->
  <div class="center">

    <div class="jarvis-status" id="jstatus">AGUARDANDO</div>

    <div class="orb-wrap" id="orbwrap" onclick="toggleVoice()">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="orb">
        <canvas id="orb-canvas"></canvas>
        <div class="orb-icon" id="orbicon">◈</div>
      </div>
    </div>

    <div style="display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;">
      <button class="cont-btn" id="contbtn" onclick="toggleContinuous()">
        🔄 CONTÍNUO
      </button>
      <button class="cont-btn" id="dictbtn" onclick="toggleDictate()">
        🎙️ DITADO
      </button>
    </div>

  </div>

  <!-- BASE -->
  <div class="bottom">
    <div class="textrow">
      <input type="text" id="txtin" placeholder="Ou escreva aqui..."/>
      <button class="sendbtn" onclick="sendText()">ENVIAR</button>
    </div>
    <div class="footer">
      <span>JARVIS v5.0 · Groq + Sheets + Voz</span>
      <span><em id="fmem">0 memórias</em></span>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════
//  BG CANVAS
// ══════════════════════════════════════════
const bgCv=document.getElementById('bg-canvas'),bgCx=bgCv.getContext('2d');
function rsz(){bgCv.width=window.innerWidth;bgCv.height=window.innerHeight;}
rsz();window.addEventListener('resize',rsz);
const pts=Array.from({length:50},()=>({x:Math.random()*bgCv.width,y:Math.random()*bgCv.height,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:Math.random()*1.2+.3,a:Math.random()*.35+.1}));
function drawBg(){
  bgCx.clearRect(0,0,bgCv.width,bgCv.height);
  bgCx.strokeStyle='rgba(0,212,255,0.03)';bgCx.lineWidth=1;
  for(let x=0;x<bgCv.width;x+=55){bgCx.beginPath();bgCx.moveTo(x,0);bgCx.lineTo(x,bgCv.height);bgCx.stroke();}
  for(let y=0;y<bgCv.height;y+=55){bgCx.beginPath();bgCx.moveTo(0,y);bgCx.lineTo(bgCv.width,y);bgCx.stroke();}
  pts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=bgCv.width;if(p.x>bgCv.width)p.x=0;
    if(p.y<0)p.y=bgCv.height;if(p.y>bgCv.height)p.y=0;
    bgCx.beginPath();bgCx.arc(p.x,p.y,p.r,0,Math.PI*2);
    bgCx.fillStyle=`rgba(0,212,255,${p.a})`;bgCx.fill();
  });
  pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{
    const d=Math.hypot(a.x-b.x,a.y-b.y);
    if(d<90){bgCx.beginPath();bgCx.moveTo(a.x,a.y);bgCx.lineTo(b.x,b.y);
      bgCx.strokeStyle=`rgba(0,212,255,${.08*(1-d/90)})`;bgCx.lineWidth=.4;bgCx.stroke();}
  }));
  requestAnimationFrame(drawBg);
}
drawBg();

// ══════════════════════════════════════════
//  ORB WAVE CANVAS
// ══════════════════════════════════════════
const orbCv=document.getElementById('orb-canvas');
const orbCx=orbCv.getContext('2d');
let orbMode='idle'; // idle | listening | speaking | thinking
let orbAmplitude=0, orbTarget=0;

function resizeOrb(){
  const orb=document.querySelector('.orb');
  orbCv.width=orb.offsetWidth;
  orbCv.height=orb.offsetHeight;
}
setTimeout(resizeOrb,100);
window.addEventListener('resize',resizeOrb);

function drawOrb(){
  const w=orbCv.width, h=orbCv.height;
  orbCx.clearRect(0,0,w,h);

  // Anima amplitude suavemente
  orbAmplitude+=(orbTarget-orbAmplitude)*0.12;

  const cx=w/2, cy=h/2;
  const t=Date.now()/1000;

  if(orbMode==='idle'){
    // Linha central suave
    orbCx.beginPath();
    orbCx.strokeStyle='rgba(0,212,255,0.3)';
    orbCx.lineWidth=1.5;
    for(let x=0;x<w;x++){
      const y=cy+Math.sin(x*0.05+t)*2;
      x===0?orbCx.moveTo(x,y):orbCx.lineTo(x,y);
    }
    orbCx.stroke();
  } else {
    // Onda principal
    const color = orbMode==='listening'?'rgba(0,255,136,':'rgba(0,212,255,';
    const color2= orbMode==='thinking'?'rgba(255,102,0,':color;

    // Múltiplas ondas
    for(let wave=0;wave<3;wave++){
      const amp = orbAmplitude*(1-wave*0.25);
      const freq = 0.06+wave*0.02;
      const speed = t*(1.5+wave*0.5);
      const alpha = (0.7-wave*0.2).toFixed(2);

      orbCx.beginPath();
      orbCx.strokeStyle=`${wave===0?color:color2}${alpha})`;
      orbCx.lineWidth=2-wave*0.5;

      for(let x=0;x<w;x++){
        const y=cy
          +Math.sin(x*freq+speed)*amp
          +Math.sin(x*freq*1.7-speed*0.8)*amp*0.4
          +Math.sin(x*freq*0.5+speed*1.2)*amp*0.2;
        x===0?orbCx.moveTo(x,y):orbCx.lineTo(x,y);
      }
      orbCx.stroke();
    }

    // Brilho central
    const grad=orbCx.createRadialGradient(cx,cy,0,cx,cy,40);
    grad.addColorStop(0,orbMode==='listening'?'rgba(0,255,136,0.08)':'rgba(0,212,255,0.08)');
    grad.addColorStop(1,'transparent');
    orbCx.fillStyle=grad;
    orbCx.beginPath();orbCx.arc(cx,cy,40,0,Math.PI*2);orbCx.fill();
  }

  requestAnimationFrame(drawOrb);
}
drawOrb();

function setOrbMode(mode){

  const wrap=document.getElementById('orbwrap');
  const icon=document.getElementById('orbicon');
  const status=document.getElementById('jstatus');

    orbTarget=0;
    icon.textContent='◈';
    status.className='jarvis-status';
    status.textContent=continuousMode?'MODO CONTÍNUO ATIVO':'AGUARDANDO';
  } else if(mode==='listening'){
    orbTarget=18;
    icon.textContent='🎤';
    status.className='jarvis-status listening';
    status.textContent='OUVINDO...';
  } else if(mode==='speaking'){

  }
}

// ══════════════════════════════════════════
//  TTS — speechSynthesis nativo, anti-travamento Android
// ══════════════════════════════════════════
let ttsBusy=false;
let ttsTimer=null;

function spokenDone(){
  ttsBusy=false;
  isThinking=false;
  clearTimeout(ttsTimer);
  try{ window.speechSynthesis.cancel(); }catch(e){}
  setOrbMode('idle');
  // Reinicia escuta nos modos ativos
  if(listenMode==='dictate'){
    setTimeout(startListening, 800);
  } else if(continuousMode){
    setTimeout(startListening, 600);
  }
}

function getVoice(){
  const vs=window.speechSynthesis.getVoices();
  return vs.find(v=>v.lang==='pt-BR'&&!/female|luciana|vitoria/i.test(v.name))
        ||vs.find(v=>v.lang==='pt-BR')
        ||vs.find(v=>v.lang.startsWith('pt'))
        ||null;
}

function speak(text){
  if(!window.speechSynthesis) return;
  clearTimeout(ttsTimer);
  window.speechSynthesis.cancel();
  ttsBusy=true;

  const clean=text
    .replace(/J\.A\.R\.V\.I\.S/gi,'JARVIS')  // evita soletração
    .replace(/[*_#`]/g,'')
    .replace(/[\u{1F000}-\u{1FFFF}]/gu,'')
    .replace(/LEARNED_JSON:\[.*?\]/gs,'')
    .replace(/\n+/g,' ')
    .trim();

  if(!clean){ spokenDone(); return; }

  // Divide em frases curtas (máx 80 chars cada)
  const raw = clean.match(/[^.!?]+[.!?]*/g) || [clean]; // divide só em pontuação forte
  const sentences = [];
  raw.forEach(s=>{
    s = s.trim();
    if(!s) return;
    // Se frase ainda for longa, divide por espaço a cada 80 chars
    while(s.length > 150){
      const cut = s.lastIndexOf(' ', 150);
      if(cut < 20){ sentences.push(s.slice(0,150)); s=s.slice(150).trim(); }
      else { sentences.push(s.slice(0,cut)); s=s.slice(cut).trim(); }
    }
    if(s) sentences.push(s);
  });

  if(sentences.length===0){ spokenDone(); return; }

  setOrbMode('speaking');
  animateSpeakWave();

  let idx=0;

  function sayNext(){
    if(!ttsBusy){ return; }
    if(idx >= sentences.length){ spokenDone(); return; }

    const sentence = sentences[idx++];
    if(!sentence.trim()){ sayNext(); return; }

    // Cancela qualquer fala anterior
    window.speechSynthesis.cancel();

    const u = new SpeechSynthesisUtterance(sentence.trim());
    u.lang='pt-BR';
    u.rate=1.0;
    u.pitch=0.85;
    u.volume=1;

    const vs = window.speechSynthesis.getVoices();
    const v = vs.find(v=>v.lang==='pt-BR' && !/female|luciana|vitoria/i.test(v.name))
             || vs.find(v=>v.lang==='pt-BR')
             || vs.find(v=>v.lang.startsWith('pt'));
    if(v) u.voice=v;

    // Duração estimada: ~65ms por char
    const delay = Math.max(2500, sentence.length * 120);

    let advanced = false;
    function advance(){
      if(advanced) return;
      advanced = true;
      clearTimeout(ttsTimer);
      ttsTimer = setTimeout(sayNext, 300); // pausa entre frases
    }

    u.onend = advance;
    u.onerror = (e)=>{
      if(e.error==='canceled'||e.error==='interrupted') return;
      advance();
    };

    window.speechSynthesis.speak(u);

    // Timer de segurança baseado no tamanho da frase
    ttsTimer = setTimeout(()=>{
      if(!advanced){
        // Força resume se pausou
        if(window.speechSynthesis.paused) window.speechSynthesis.resume();
        // Aguarda mais um pouco antes de avançar
        setTimeout(advance, 800);
      }
    }, delay);
  }

  // Safety global: máx 60s de fala
  const _safety = setTimeout(()=>{ if(ttsBusy) spokenDone(); }, 60000);

  if(window.speechSynthesis.getVoices().length === 0){
    window.speechSynthesis.onvoiceschanged = ()=> sayNext();
  } else {
    sayNext();
  }
}

// ══════════════════════════════════════════
//  STT — fluxo simplificado e robusto
// ══════════════════════════════════════════
let rec=null, listening=false, listenMode='normal';

const TRIGGER_WORDS=['pode falar','jarvis responde','pode responder','responde jarvis','ok jarvis'];

function buildRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ speak('Reconhecimento de voz não disponível, senhor.'); return null; }

  const r=new SR();
  r.lang='pt-BR';
  r.continuous=true;
  r.interimResults=true;
  r.maxAlternatives=1;

  let silenceTimer=null;
  let accumulated='';
  let sent=false; // evita envio duplo

  function doSend(){
    if(sent) return;
    const txt=accumulated.trim();
    if(!txt) return;
    sent=true;
    accumulated='';
    clearTimeout(silenceTimer);
    try{ r.stop(); }catch(e){}
    sendToJarvis(txt);
  }

  r.onstart=()=>{
    listening=true;
    accumulated='';
    sent=false;
    setOrbMode('listening');
    if(listenMode==='dictate'){
      const js=document.getElementById('jstatus');
      if(js){ js.textContent='● DITANDO — diga "pode falar"'; js.style.color='#ffcc00'; }
    }
  };

  r.onresult=e=>{
    if(sent) return;
    let interim='', fin='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) fin+=e.results[i][0].transcript+' ';
      else interim+=e.results[i][0].transcript;
    }

    if(fin){
      accumulated+=fin;
      // Modo ditado: só envia no trigger
      if(listenMode==='dictate'){
        const lower=accumulated.toLowerCase();
        if(TRIGGER_WORDS.some(t=>lower.includes(t))){
          TRIGGER_WORDS.forEach(t=>{ accumulated=accumulated.replace(new RegExp(t,'gi'),''); });
          doSend();
        }
      } else {
        // Modo normal: timer de silêncio de 2s
        clearTimeout(silenceTimer);
        silenceTimer=setTimeout(doSend, 2000);
      }
    }

    if(interim && !sent){
      const preview=(accumulated+interim).slice(-35).toUpperCase();
      const js=document.getElementById('jstatus');
      if(js && listenMode!=='dictate') js.textContent=preview+'...';
      orbTarget=12+Math.random()*14;
    }
  };

  r.onerror=e=>{
    clearTimeout(silenceTimer);
    listening=false;
    if(e.error==='not-allowed'){
      speak('Microfone negado, senhor. Verifique as permissões.');
    } else if(e.error==='no-speech'){
      // Reinicia automaticamente nos modos ativos
      if(listenMode==='dictate'||continuousMode) setTimeout(startListening,500);
      else setOrbMode('idle');
    } else {
      setOrbMode('idle');
    }
  };

  r.onend=()=>{
    clearTimeout(silenceTimer);
    listening=false;
    if(sent) return; // já enviou, não faz nada
    if(listenMode==='dictate'){
      // Modo ditado reinicia sempre até receber trigger
      if(orbMode!=='speaking'&&orbMode!=='thinking') setTimeout(startListening,300);
    } else if(continuousMode){
      if(orbMode!=='speaking'&&orbMode!=='thinking') setTimeout(startListening,500);
    } else {
      setOrbMode('idle');
    }
  };

  return r;
}

function startListening(){
  if(listening) return;
  if(orbMode==='speaking'||orbMode==='thinking') return;
  rec=buildRec();
  if(!rec) return;
  try{ rec.start(); }catch(e){ console.warn(e); }
}

function stopListening(){
  if(!listening) return;
  try{ rec&&rec.stop(); }catch(e){}
  listening=false;
  setOrbMode('idle');
}

function toggleVoice(){
  // Se ttsBusy mas não está realmente falando, reseta
  if(ttsBusy && !window.speechSynthesis.speaking && !window.speechSynthesis.pending){
    ttsBusy=false;
    setOrbMode('idle');
  }
  // Para fala se estiver falando de verdade
  if(ttsBusy){
    ttsBusy=false;
    clearTimeout(ttsTimer);
    window.speechSynthesis.cancel();
    setOrbMode('idle');
    if(continuousMode||listenMode==='dictate') setTimeout(startListening,300);
    return;
  }
  // Para escuta se estiver ouvindo
  if(listening){
    stopListening();
    return;
  }
  // Inicia escuta
  startListening();
}

function toggleContinuous(){
  // Desativa ditado se estiver ativo
  if(listenMode==='dictate') toggleDictate();

  continuousMode=!continuousMode;
  const btn=document.getElementById('contbtn');
  if(continuousMode){
    btn.classList.add('active');
    btn.textContent='🔄 CONTÍNUO ON';
    listenMode='normal';
    startListening();
  } else {
    btn.classList.remove('active');
    btn.textContent='🔄 CONTÍNUO';
    if(listening) rec&&rec.stop();
    setOrbMode('idle');
  }
}

function toggleDictate(){
  // Desativa contínuo se estiver ativo
  if(continuousMode){
    continuousMode=false;
    document.getElementById('contbtn').classList.remove('active');
    document.getElementById('contbtn').textContent='🔄 CONTÍNUO';
    if(document.getElementById('imm-contbtn'))
      document.getElementById('imm-contbtn').textContent='🔄 CONTÍNUO';
  }

  const btn  = document.getElementById('dictbtn');
  const ibtn = document.getElementById('imm-dictbtn');

  if(listenMode==='dictate'){
    // ── DESATIVAR ──
    listenMode='normal';
    btn.classList.remove('active');
    btn.textContent='🎙️ DITADO';
    if(ibtn){ ibtn.classList.remove('active'); ibtn.textContent='🎙️ DITADO'; }
    if(listening){ rec&&rec.stop(); }
    setOrbMode('idle');
    const js=document.getElementById('jstatus');
    if(js) js.style.color='';
  } else {
    // ── ATIVAR — loop permanente ──
    listenMode='dictate';
    btn.classList.add('active');
    btn.textContent='🎙️ DITADO ON';
    if(ibtn){ ibtn.classList.add('active'); ibtn.textContent='🎙️ DITADO ON'; }
    if(listening){ rec&&rec.stop(); }
    // Pequeno aviso e já começa a gravar
    setTimeout(()=>{
      startListening();
    }, 300);
  }
}

//  MODO IMERSIVO
// ══════════════════════════════════════════
let immersiveActive=false;
const immCv=document.getElementById('imm-canvas');
const immCx=immCv.getContext('2d');
let immAmplitude=0, immTarget=0;

function resizeImmCanvas(){
  const orb=document.querySelector('.immersive-orb');
  if(orb){ immCv.width=orb.offsetWidth; immCv.height=orb.offsetHeight; }
}
setTimeout(resizeImmCanvas,200);
window.addEventListener('resize',resizeImmCanvas);

function drawImmOrb(){
  const w=immCv.width||200, h=immCv.height||200;
  immCx.clearRect(0,0,w,h);
  immAmplitude+=(immTarget-immAmplitude)*0.12;
  const cy=h/2;
  const t=Date.now()/1000;

  if(orbMode==='idle'){
    immCx.beginPath();
    immCx.strokeStyle='rgba(0,212,255,0.3)';
    immCx.lineWidth=1.5;
    for(let x=0;x<w;x++){
      const y=cy+Math.sin(x*0.05+t)*2;
      x===0?immCx.moveTo(x,y):immCx.lineTo(x,y);
    }
    immCx.stroke();
  } else {
    const color=orbMode==='listening'?'rgba(0,255,136,':'rgba(0,212,255,';
    for(let wave=0;wave<3;wave++){
      const amp=immAmplitude*(1-wave*0.25);
      const freq=0.055+wave*0.018;
      const speed=t*(1.5+wave*0.5);
      const alpha=(0.7-wave*0.2).toFixed(2);
      immCx.beginPath();
      immCx.strokeStyle=`${color}${alpha})`;
      immCx.lineWidth=2.5-wave*0.6;
      for(let x=0;x<w;x++){
        const y=cy+Math.sin(x*freq+speed)*amp+Math.sin(x*freq*1.7-speed*0.8)*amp*0.4;
        x===0?immCx.moveTo(x,y):immCx.lineTo(x,y);
      }
      immCx.stroke();
    }
  }
  requestAnimationFrame(drawImmOrb);
}
drawImmOrb();

// Sincroniza estado do orb imersivo com o principal
const _setOrbMode=setOrbMode;
setOrbMode=function(mode){
  _setOrbMode(mode);
  // Espelha no imersivo
  const iw=document.getElementById('imm-orbwrap');
  const ii=document.getElementById('imm-icon');
  const is=document.getElementById('imm-status');
  // Espelha no imersivo apenas se estiver visível
  if(iw){
    iw.className='immersive-orb-wrap '+mode;
    immTarget=orbTarget;
  }

  if(ii && is){
    if(mode==='idle'){
      immTarget=0;
      ii.textContent='◈';
      is.className='immersive-status';
      is.textContent=continuousMode?'MODO CONTÍNUO ATIVO':listenMode==='dictate'?'● DITANDO — FALE À VONTADE':'AGUARDANDO';
    } else if(mode==='listening'){
      immTarget=22;
      ii.textContent='🎤';
      is.className='immersive-status listening';
      is.textContent=listenMode==='dictate'?'● DITANDO — FALE À VONTADE':'OUVINDO...';
    } else if(mode==='speaking'){
      immTarget=32;
      ii.textContent='◈';
      is.className='immersive-status speaking';
      is.textContent='PROCESSANDO VOZ...';
    } else if(mode==='thinking'){
      immTarget=10;
      ii.textContent='⟳';
      is.className='immersive-status thinking';
      is.textContent='ANALISANDO...';
    }
  }
};

// Sincroniza botões imersivos com estado
function syncImmButtons(){
  const ic=document.getElementById('imm-contbtn');
  const id=document.getElementById('imm-dictbtn');
  if(ic) ic.className='imm-btn'+(continuousMode?' active':'');
  if(id) id.className='imm-btn'+(listenMode==='dictate'?' active':'');
}

const _toggleCont=toggleContinuous;
toggleContinuous=function(){ _toggleCont(); syncImmButtons();
  document.getElementById('contbtn').textContent=continuousMode?'🔄 CONTÍNUO ON':'🔄 CONTÍNUO';
  document.getElementById('imm-contbtn').textContent=continuousMode?'🔄 CONTÍNUO ON':'🔄 CONTÍNUO';
};

const _toggleDict=toggleDictate;
toggleDictate=function(){ _toggleDict(); syncImmButtons();
  const on=listenMode==='dictate';
  document.getElementById('dictbtn').textContent=on?'🎙️ DITADO ON':'🎙️ DITADO';
  document.getElementById('imm-dictbtn').textContent=on?'🎙️ DITADO ON':'🎙️ DITADO';
};

function toggleImmersive(){
  immersiveActive=!immersiveActive;
  const overlay=document.getElementById('immersive');
  overlay.classList.toggle('active', immersiveActive);

  if(immersiveActive){
    // Tela cheia real no mobile
    if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
    setTimeout(resizeImmCanvas,300);
    syncImmButtons();
  } else {
    if(document.exitFullscreen) document.exitFullscreen().catch(()=>{});
  }
}

// ESC fecha imersivo
document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&immersiveActive) toggleImmersive(); });
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement&&immersiveActive) toggleImmersive();
});

// 🔋 Bateria
async function getBateria(){
  try{
    if(!navigator.getBattery) return null;
    const b = await navigator.getBattery();
    return {
      nivel: Math.round(b.level * 100),
      carregando: b.charging,
      tempoRestante: b.dischargingTime === Infinity ? null : Math.round(b.dischargingTime/60)
    };
  }catch(e){ return null; }
}

// 📍 Localização
function getLocalizacao(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation){ resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({
        lat: pos.coords.latitude.toFixed(5),
        lon: pos.coords.longitude.toFixed(5),
        precisao: Math.round(pos.coords.accuracy)
      }),
      () => resolve(null),
      {timeout:8000, enableHighAccuracy:true}
    );
  });
}

// 📞 Ligar
function fazerLigacao(numero){
  const limpo = numero.replace(/\D/g,'');
  window.location.href = `tel:${limpo}`;
}

// 📲 WhatsApp
function enviarWhatsApp(numero, mensagem){
  const limpo = numero.replace(/\D/g,'');
  const txt = encodeURIComponent(mensagem);
  window.open(`https://wa.me/55${limpo}?text=${txt}`, '_blank');
}

// 🌐 Detecta comandos de dispositivo na resposta do JARVIS
async function detectarComandoDispositivo(texto){
  const t = texto.toLowerCase();

  // Bateria
  if(t.includes('[cmd:bateria]')){
    const b = await getBateria();
    if(b){
      const info = `Bateria: ${b.nivel}%, ${b.carregando?'carregando':'descarregando'}${b.tempoRestante?`, aprox. ${b.tempoRestante} min restantes`:''}`;
      return info;
    }
  }

  // Localização
  if(t.includes('[cmd:localizacao]')){
    const loc = await getLocalizacao();
    if(loc){
      return `Localização: lat ${loc.lat}, lon ${loc.lon} (precisão ${loc.precisao}m). Link: https://maps.google.com/?q=${loc.lat},${loc.lon}`;
    }
  }

  // Ligar — formato [cmd:ligar:NUMERO]
  const ligarMatch = texto.match(/\[cmd:ligar:([\d\s\+\-\(\)]+)\]/i);
  if(ligarMatch){
    setTimeout(()=>fazerLigacao(ligarMatch[1]), 1000);
    return `Iniciando chamada para ${ligarMatch[1]}, senhor.`;
  }

  // WhatsApp — formato [cmd:whatsapp:NUMERO:MENSAGEM]
  const waMatch = texto.match(/\[cmd:whatsapp:([\d\s\+\-\(\)]+):(.+?)\]/i);
  if(waMatch){
    setTimeout(()=>enviarWhatsApp(waMatch[1], waMatch[2]), 1000);
    return `Abrindo WhatsApp para ${waMatch[1]}, senhor.`;
  }

  return null;
}
