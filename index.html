<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>J.A.R.V.I.S</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --primary:#00d4ff; --accent:#ff6600;
    --bg:#020a12; --panel:rgba(0,20,40,0.9);
    --text:#b8e4f5; --dim:#5a8fa8;
    --glow:0 0 20px rgba(0,212,255,0.6);
    --border:rgba(0,212,255,0.2);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; width:100%; background:var(--bg); font-family:'Share Tech Mono',monospace; color:var(--text); overflow:hidden; }

  #bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

  .shell {
    position:relative; z-index:1;
    display:flex; flex-direction:column;
    height:100%; max-width:480px;
    margin:0 auto; padding:10px 10px 8px;
    gap:6px;
  }

  /* ── HEADER ── */
  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding-bottom:8px; border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .logo { display:flex; align-items:center; gap:8px; }
  .arc { width:30px; height:30px; flex-shrink:0; }
  .arc svg { width:100%; height:100%; animation:spin 6s linear infinite; filter:drop-shadow(0 0 6px var(--primary)); }
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .logo h1 { font-family:'Orbitron',sans-serif; font-size:0.8rem; font-weight:900; color:var(--primary); letter-spacing:.25em; text-shadow:var(--glow); }
  .logo p  { font-size:0.42rem; color:var(--dim); letter-spacing:.12em; margin-top:1px; }
  .status { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
  .srow   { display:flex; align-items:center; gap:4px; font-size:0.48rem; color:var(--dim); letter-spacing:.08em; }
  .dot    { width:5px; height:5px; border-radius:50%; background:#00ff88; box-shadow:0 0 5px #00ff88; animation:blink 2s infinite; }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  /* ── SHEETS TOOLBAR ── */
  .toolbar { display:flex; gap:5px; align-items:center; flex-shrink:0; }
  .toolbar input {
    flex:1; background:rgba(0,20,40,.8); border:1px solid var(--border);
    color:var(--dim); font-family:'Share Tech Mono',monospace;
    font-size:0.5rem; padding:4px 8px; border-radius:3px; outline:none;
  }
  .toolbar input:focus { border-color:var(--primary); }
  .tbtn {
    background:rgba(0,212,255,.07); border:1px solid var(--border);
    color:var(--dim); font-family:'Share Tech Mono',monospace;
    font-size:0.48rem; letter-spacing:.06em;
    padding:4px 8px; border-radius:3px; cursor:pointer; white-space:nowrap; transition:all .15s;
  }
  .tbtn:hover,.tbtn:active { background:rgba(0,212,255,.2); color:var(--primary); border-color:var(--primary); }
  .tbtn.active { background:rgba(0,212,255,.25); color:var(--primary); border-color:var(--primary); box-shadow:0 0 10px rgba(0,212,255,.4); }
  #sst { font-size:0.46rem; padding:3px 6px; border-radius:3px; border:1px solid var(--border); white-space:nowrap; }
  #sst.ok     { color:#00ff88; border-color:rgba(0,255,136,.3); background:rgba(0,255,136,.05); }
  #sst.err    { color:#ff4444; border-color:rgba(255,68,68,.3); }
  #sst.loading{ color:var(--dim); }

  /* ── MEMÓRIA ── */
  .membar {
    display:flex; align-items:center; gap:6px;
    padding:3px 10px; background:var(--panel);
    border:1px solid var(--border); border-radius:3px;
    font-size:0.48rem; overflow:hidden; white-space:nowrap; flex-shrink:0;
  }
  .memlabel { color:var(--primary); flex-shrink:0; }
  .memscroll { flex:1; overflow:hidden; }
  .memtags { display:flex; gap:5px; }
  .mtag { background:rgba(0,212,255,.1); border:1px solid rgba(0,212,255,.3); border-radius:2px; padding:1px 6px; color:var(--primary); font-size:0.46rem; white-space:nowrap; }

  /* ── ÁREA CENTRAL — CÍRCULO JARVIS ── */
  .center {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:20px; position:relative;
  }

  /* Status text acima do círculo */
  .jarvis-status {
    font-family:'Orbitron',sans-serif;
    font-size:0.6rem; letter-spacing:.25em;
    color:var(--dim); text-align:center;
    min-height:16px; transition:color .3s;
  }
  .jarvis-status.listening { color:#00ff88; }
  .jarvis-status.speaking  { color:var(--primary); text-shadow:var(--glow); }
  .jarvis-status.thinking  { color:var(--accent); }

  /* Círculo principal */
  .orb-wrap {
    position:relative;
    width:220px; height:220px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }

  /* Anéis externos pulsantes */
  .ring {
    position:absolute; border-radius:50%;
    border:1px solid rgba(0,212,255,0.15);
    animation:ring-pulse 3s ease-in-out infinite;
  }
  .ring:nth-child(1){ width:220px; height:220px; animation-delay:0s; }
  .ring:nth-child(2){ width:190px; height:190px; animation-delay:.4s; }
  .ring:nth-child(3){ width:160px; height:160px; animation-delay:.8s; border-color:rgba(0,212,255,0.25); }

  @keyframes ring-pulse{
    0%,100%{ opacity:.3; transform:scale(1); }
    50%     { opacity:.8; transform:scale(1.03); }
  }

  .orb-wrap.listening .ring { border-color:rgba(0,255,136,0.3); animation-duration:1s; }
  .orb-wrap.speaking  .ring { border-color:rgba(0,212,255,0.5); animation-duration:.6s; }
  .orb-wrap.thinking  .ring { border-color:rgba(255,102,0,0.3); animation-duration:1.5s; }

  /* Círculo central */
  .orb {
    width:130px; height:130px; border-radius:50%;
    background:radial-gradient(circle at 40% 35%, rgba(0,212,255,0.18), rgba(0,10,25,0.95));
    border:2px solid rgba(0,212,255,0.4);
    box-shadow: 0 0 30px rgba(0,212,255,0.2), inset 0 0 30px rgba(0,212,255,0.05);
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
    transition:box-shadow .3s, border-color .3s;
  }

  .orb-wrap.listening .orb {
    border-color:rgba(0,255,136,0.6);
    box-shadow:0 0 40px rgba(0,255,136,0.4), inset 0 0 20px rgba(0,255,136,0.1);
  }
  .orb-wrap.speaking .orb {
    border-color:rgba(0,212,255,0.8);
    box-shadow:0 0 60px rgba(0,212,255,0.6), inset 0 0 30px rgba(0,212,255,0.15);
  }
  .orb-wrap.thinking .orb {
    border-color:rgba(255,102,0,0.5);
    box-shadow:0 0 40px rgba(255,102,0,0.3), inset 0 0 20px rgba(255,102,0,0.08);
  }

  /* Canvas de onda dentro do círculo */
  #orb-canvas {
    position:absolute; inset:0;
    border-radius:50%;
  }

  /* Ícone central */
  .orb-icon {
    position:relative; z-index:2;
    font-size:2.2rem;
    filter:drop-shadow(0 0 8px var(--primary));
    transition:all .3s;
    user-select:none;
  }

  .orb-wrap.listening .orb-icon { filter:drop-shadow(0 0 12px #00ff88); }
  .orb-wrap.speaking  .orb-icon { filter:drop-shadow(0 0 16px var(--primary)); animation:icon-pulse .6s ease-in-out infinite; }
  .orb-wrap.thinking  .orb-icon { filter:drop-shadow(0 0 10px var(--accent)); animation:icon-spin-slow 2s linear infinite; }

  @keyframes icon-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
  @keyframes icon-spin-slow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  /* Botão contínuo */
  .cont-btn {
    font-family:'Orbitron',sans-serif;
    font-size:0.52rem; letter-spacing:.15em;
    color:var(--dim); background:transparent;
    border:1px solid var(--border);
    padding:5px 18px; border-radius:20px;
    cursor:pointer; transition:all .2s;
  }
  .cont-btn:active,.cont-btn:hover { color:var(--primary); border-color:var(--primary); }
  .cont-btn.active {
    color:var(--primary); border-color:var(--primary);
    background:rgba(0,212,255,.1);
    box-shadow:0 0 14px rgba(0,212,255,.3);
  }

  /* ── INPUT TEXTO (discreto, na base) ── */
  .bottom {
    display:flex; flex-direction:column; gap:5px; flex-shrink:0;
  }
  .textrow {
    display:flex; gap:6px;
    border-top:1px solid rgba(0,212,255,.1); padding-top:6px;
  }
  .textrow input {
    flex:1; background:rgba(0,40,70,.5); border:1px solid rgba(0,212,255,.15);
    border-bottom:1px solid rgba(0,212,255,.3);
    color:var(--text); font-family:'Share Tech Mono',monospace;
    font-size:0.68rem; padding:6px 10px; outline:none; border-radius:2px;
  }
  .textrow input:focus { border-color:var(--primary); }
  .textrow input::placeholder { color:rgba(90,143,168,.4); font-size:0.6rem; }
  .sendbtn {
    background:rgba(0,212,255,.08); border:1px solid rgba(0,212,255,.3);
    color:var(--primary); font-family:'Orbitron',sans-serif;
    font-size:0.48rem; font-weight:700; letter-spacing:.1em;
    padding:0 10px; height:32px; cursor:pointer; border-radius:2px; white-space:nowrap;
  }
  .sendbtn:active { background:rgba(0,212,255,.2); }

  .footer {
    display:flex; justify-content:space-between;
    font-size:0.44rem; color:rgba(90,143,168,.5); letter-spacing:.05em;
  }
  .footer em { color:rgba(255,102,0,.5); font-style:normal; }

  body::after {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:999;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,.008) 2px,rgba(0,212,255,.008) 4px);
  }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="shell">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="arc">
        <svg viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="45" stroke="#00d4ff" stroke-width="1.5" opacity=".3"/>
          <circle cx="50" cy="50" r="32" stroke="#00d4ff" stroke-width="1" opacity=".5"/>
          <circle cx="50" cy="50" r="17" fill="rgba(0,212,255,.1)" stroke="#00d4ff" stroke-width="2"/>
          <circle cx="50" cy="50" r="7" fill="rgba(0,212,255,.6)"/>
          <line x1="50" y1="5" x2="50" y2="13" stroke="#00d4ff" stroke-width="2" opacity=".8"/>
          <line x1="50" y1="87" x2="50" y2="95" stroke="#00d4ff" stroke-width="2" opacity=".8"/>
          <line x1="5" y1="50" x2="13" y2="50" stroke="#00d4ff" stroke-width="2" opacity=".8"/>
          <line x1="87" y1="50" x2="95" y2="50" stroke="#00d4ff" stroke-width="2" opacity=".8"/>
        </svg>
      </div>
      <div>
        <h1>J.A.R.V.I.S</h1>
        <p>JUST A RATHER VERY INTELLIGENT SYSTEM</p>
      </div>
    </div>
    <div class="status">
      <div class="srow"><div class="dot"></div>ONLINE</div>
      <div class="srow" id="stime">00:00</div>
      <div class="srow" id="smem">MEM: 0</div>
    </div>
  </div>

  <!-- SHEETS TOOLBAR -->
  <div class="toolbar">
    <input id="surl" placeholder="URL Apps Script..."/>
    <button class="tbtn" onclick="connectSheets()">⚡</button>
    <button class="tbtn" onclick="syncMemory()">↻</button>
    <div id="sst" class="loading">OFFLINE</div>
  </div>

  <!-- MEMÓRIA -->
  <div class="membar">
    <span class="memlabel">◈ MEM:</span>
    <div class="memscroll">
      <div class="memtags" id="memtags">
        <span class="mtag" style="opacity:.4;font-style:italic">vazia</span>
      </div>
    </div>
  </div>

  <!-- CENTRO — CÍRCULO JARVIS -->
  <div class="center">

    <div class="jarvis-status" id="jstatus">AGUARDANDO</div>

    <div class="orb-wrap" id="orbwrap" onclick="toggleVoice()">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="orb">
        <canvas id="orb-canvas"></canvas>
        <div class="orb-icon" id="orbicon">◈</div>
      </div>
    </div>

    <button class="cont-btn" id="contbtn" onclick="toggleContinuous()">
      🔄 MODO CONTÍNUO
    </button>

  </div>

  <!-- BASE -->
  <div class="bottom">
    <div class="textrow">
      <input type="text" id="txtin" placeholder="Ou escreva aqui..."/>
      <button class="sendbtn" onclick="sendText()">ENVIAR</button>
    </div>
    <div class="footer">
      <span>JARVIS v5.0 · Groq + Sheets + Voz</span>
      <span><em id="fmem">0 memórias</em></span>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════
//  BG CANVAS
// ══════════════════════════════════════════
const bgCv=document.getElementById('bg-canvas'),bgCx=bgCv.getContext('2d');
function rsz(){bgCv.width=window.innerWidth;bgCv.height=window.innerHeight;}
rsz();window.addEventListener('resize',rsz);
const pts=Array.from({length:50},()=>({x:Math.random()*bgCv.width,y:Math.random()*bgCv.height,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:Math.random()*1.2+.3,a:Math.random()*.35+.1}));
function drawBg(){
  bgCx.clearRect(0,0,bgCv.width,bgCv.height);
  bgCx.strokeStyle='rgba(0,212,255,0.03)';bgCx.lineWidth=1;
  for(let x=0;x<bgCv.width;x+=55){bgCx.beginPath();bgCx.moveTo(x,0);bgCx.lineTo(x,bgCv.height);bgCx.stroke();}
  for(let y=0;y<bgCv.height;y+=55){bgCx.beginPath();bgCx.moveTo(0,y);bgCx.lineTo(bgCv.width,y);bgCx.stroke();}
  pts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=bgCv.width;if(p.x>bgCv.width)p.x=0;
    if(p.y<0)p.y=bgCv.height;if(p.y>bgCv.height)p.y=0;
    bgCx.beginPath();bgCx.arc(p.x,p.y,p.r,0,Math.PI*2);
    bgCx.fillStyle=`rgba(0,212,255,${p.a})`;bgCx.fill();
  });
  pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{
    const d=Math.hypot(a.x-b.x,a.y-b.y);
    if(d<90){bgCx.beginPath();bgCx.moveTo(a.x,a.y);bgCx.lineTo(b.x,b.y);
      bgCx.strokeStyle=`rgba(0,212,255,${.08*(1-d/90)})`;bgCx.lineWidth=.4;bgCx.stroke();}
  }));
  requestAnimationFrame(drawBg);
}
drawBg();

// ══════════════════════════════════════════
//  ORB WAVE CANVAS
// ══════════════════════════════════════════
const orbCv=document.getElementById('orb-canvas');
const orbCx=orbCv.getContext('2d');
let orbMode='idle'; // idle | listening | speaking | thinking
let orbAmplitude=0, orbTarget=0;

function resizeOrb(){
  const orb=document.querySelector('.orb');
  orbCv.width=orb.offsetWidth;
  orbCv.height=orb.offsetHeight;
}
setTimeout(resizeOrb,100);
window.addEventListener('resize',resizeOrb);

function drawOrb(){
  const w=orbCv.width, h=orbCv.height;
  orbCx.clearRect(0,0,w,h);

  // Anima amplitude suavemente
  orbAmplitude+=(orbTarget-orbAmplitude)*0.12;

  const cx=w/2, cy=h/2;
  const t=Date.now()/1000;

  if(orbMode==='idle'){
    // Linha central suave
    orbCx.beginPath();
    orbCx.strokeStyle='rgba(0,212,255,0.3)';
    orbCx.lineWidth=1.5;
    for(let x=0;x<w;x++){
      const y=cy+Math.sin(x*0.05+t)*2;
      x===0?orbCx.moveTo(x,y):orbCx.lineTo(x,y);
    }
    orbCx.stroke();
  } else {
    // Onda principal
    const color = orbMode==='listening'?'rgba(0,255,136,':'rgba(0,212,255,';
    const color2= orbMode==='thinking'?'rgba(255,102,0,':color;

    // Múltiplas ondas
    for(let wave=0;wave<3;wave++){
      const amp = orbAmplitude*(1-wave*0.25);
      const freq = 0.06+wave*0.02;
      const speed = t*(1.5+wave*0.5);
      const alpha = (0.7-wave*0.2).toFixed(2);

      orbCx.beginPath();
      orbCx.strokeStyle=`${wave===0?color:color2}${alpha})`;
      orbCx.lineWidth=2-wave*0.5;

      for(let x=0;x<w;x++){
        const y=cy
          +Math.sin(x*freq+speed)*amp
          +Math.sin(x*freq*1.7-speed*0.8)*amp*0.4
          +Math.sin(x*freq*0.5+speed*1.2)*amp*0.2;
        x===0?orbCx.moveTo(x,y):orbCx.lineTo(x,y);
      }
      orbCx.stroke();
    }

    // Brilho central
    const grad=orbCx.createRadialGradient(cx,cy,0,cx,cy,40);
    grad.addColorStop(0,orbMode==='listening'?'rgba(0,255,136,0.08)':'rgba(0,212,255,0.08)');
    grad.addColorStop(1,'transparent');
    orbCx.fillStyle=grad;
    orbCx.beginPath();orbCx.arc(cx,cy,40,0,Math.PI*2);orbCx.fill();
  }

  requestAnimationFrame(drawOrb);
}
drawOrb();

function setOrbMode(mode){
  orbMode=mode;
  const wrap=document.getElementById('orbwrap');
  const icon=document.getElementById('orbicon');
  const status=document.getElementById('jstatus');
  wrap.className='orb-wrap '+mode;

  if(mode==='idle'){
    orbTarget=0;
    icon.textContent='◈';
    status.className='jarvis-status';
    status.textContent=continuousMode?'MODO CONTÍNUO ATIVO':'AGUARDANDO';
  } else if(mode==='listening'){
    orbTarget=18;
    icon.textContent='🎤';
    status.className='jarvis-status listening';
    status.textContent='OUVINDO...';
  } else if(mode==='speaking'){
    orbTarget=28;
    icon.textContent='◈';
    status.className='jarvis-status speaking';
    status.textContent='PROCESSANDO VOZ...';
  } else if(mode==='thinking'){
    orbTarget=8;
    icon.textContent='⟳';
    status.className='jarvis-status thinking';
    status.textContent='ANALISANDO...';
  }
}

// Vibra a onda randomicamente durante fala
function animateSpeakWave(){
  if(orbMode!=='speaking')return;
  orbTarget=20+Math.random()*18;
  setTimeout(animateSpeakWave, 80+Math.random()*120);
}

// ══════════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════════
let memory=[],history=[],isThinking=false,continuousMode=false;
let t0=Date.now();
const SHEETS_URL='https://script.google.com/macros/s/AKfycbwzFN_DIekH4poNAoi0r4_B7___7bmsY9rUbwDNgWgqEqB5Wfw0D-Y3BM9tgI42oH-xSg/exec';
const WORKER_URL='https://jarvis-proxy.gabriel-serejo290.workers.dev';
let sheetsURL=SHEETS_URL;
document.getElementById('surl').value=sheetsURL;

setInterval(()=>{
  const s=Math.floor((Date.now()-t0)/1000);
  document.getElementById('stime').textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
},1000);

// ══════════════════════════════════════════
//  SHEETS
// ══════════════════════════════════════════
function setSst(cls,txt){const e=document.getElementById('sst');e.className=cls;e.textContent=txt;}

async function connectSheets(){
  const url=document.getElementById('surl').value.trim();
  if(!url)return;
  sheetsURL=url;
  setSst('loading','...');
  try{
    const r=await fetch(sheetsURL+'?action=ping');
    const d=await r.json();
    if(d.ok){setSst('ok','● ON');await syncMemory();}
    else throw new Error();
  }catch(e){setSst('err','✕ ERR');}
}

async function syncMemory(){
  if(!sheetsURL)return;
  try{
    const r=await fetch(sheetsURL+'?action=read');
    const d=await r.json();
    if(!d.ok)throw new Error();
    memory=d.records.map(r=>({tag:r.tag,detail:r.detail}));
    refreshMem();
    setSst('ok',`● ${memory.length}`);
  }catch(e){setSst('err','✕');}
}

async function saveToSheets(tag,detail){
  if(!sheetsURL)return;
  try{
    const p=new URLSearchParams({action:'write',tag,detail,category:'AUTO'});
    await fetch(sheetsURL+'?'+p);
  }catch(e){}
}

function refreshMem(){
  const c=document.getElementById('memtags');
  document.getElementById('smem').textContent=`MEM: ${memory.length}`;
  document.getElementById('fmem').textContent=`${memory.length} memórias`;
  if(!memory.length){c.innerHTML='<span class="mtag" style="opacity:.4;font-style:italic">vazia</span>';return;}
  c.innerHTML=memory.slice(-10).map(m=>`<span class="mtag" title="${esc(m.detail)}">${esc(m.tag)}</span>`).join('');
}

function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ══════════════════════════════════════════
//  SYSTEM PROMPT
// ══════════════════════════════════════════
function buildPrompt(){
  const mem=memory.length
    ?'\n\nMEMÓRIA PERSISTENTE:\n'+memory.map((m,i)=>`${i+1}. [${m.tag}] ${m.detail}`).join('\n')
    :'';
  return `Você é J.A.R.V.I.S (Just A Rather Very Intelligent System), a inteligência artificial criada por Tony Stark. Responda SEMPRE em português do Brasil.

PERSONALIDADE:
- Fala formal, preciso, econômico. Zero gírias
- Tom irônico britânico, humor seco
- Chama SEMPRE de "senhor" ou "senhora"
- Expressões: "Certamente, senhor.", "Permita-me verificar.", "Conforme solicitado.", "Devo alertar que...", "Análise concluída."
- Respostas curtas (2-3 frases no máximo) — serão lidas em voz alta

APRENDIZADO:

- Retorne: LEARNED_JSON:[{"tag":"TAG","detail":"detalhe"}]
- Se nada: LEARNED_JSON:[]
- Tags: maiúsculas, máx 3 palavras
${mem}`;

// ══════════════════════════════════════════
//  API
// ══════════════════════════════════════════
async function sendToJarvis(text){
  if(!text||isThinking)return;
  isThinking=true;
  setOrbMode('thinking');

  history.push({role:'user',content:text});

  try{
    const res=await fetch(WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:buildPrompt(),messages:history})
    });
    const data=await res.json();
    const raw=(data.content||[]).map(b=>b.text||'').join('');

    const lm=raw.match(/LEARNED_JSON:(\[.*?\])/s);
    let clean=raw.replace(/LEARNED_JSON:\[.*?\]/s,'').trim();

    if(lm){
      try{
        JSON.parse(lm[1]).forEach(item=>{
          if(!item.tag||!item.detail)return;
          const ex=memory.find(m=>m.tag===item.tag);
          if(!ex) memory.push({tag:item.tag,detail:item.detail});
          else ex.detail=item.detail;
          saveToSheets(item.tag,item.detail);
        });
        refreshMem();
      }catch(e){}
    }

    history.push({role:'assistant',content:clean});
    speak(clean);

  }catch(err){
    isThinking=false;
    setOrbMode('idle');
    speak('Sistemas temporariamente offline, senhor.');
  }
  isThinking=false;
}

// ══════════════════════════════════════════
//  TTS — frase a frase, sem travar
// ══════════════════════════════════════════
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();

  const clean=text
    .replace(/[*_#`]/g,'')
    .replace(/[\u{1F000}-\u{1FFFF}]/gu,'')
    .replace(/LEARNED_JSON:\[.*?\]/gs,'')
    .trim();

  const sentences=clean.match(/[^.!?]+[.!?]+/g)||[clean];
  let idx=0;

  setOrbMode('speaking');
  animateSpeakWave();

  function next(){
    if(idx>=sentences.length){
      onDone(); return;
    }
    const u=new SpeechSynthesisUtterance(sentences[idx].trim());
    u.lang='pt-BR'; u.rate=1.08; u.pitch=0.82; u.volume=1;

    const vs=window.speechSynthesis.getVoices();
    const v=vs.find(v=>v.lang==='pt-BR'&&/daniel|ricardo|antonio|masc|male/i.test(v.name))
            ||vs.find(v=>v.lang==='pt-BR'&&!/female|luciana|vitoria/i.test(v.name))
            ||vs.find(v=>v.lang==='pt-BR')
            ||vs.find(v=>v.lang.startsWith('pt'));
    if(v)u.voice=v;

    u.onend=()=>{ idx++; next(); };
    u.onerror=()=>{ idx++; next(); };
    window.speechSynthesis.speak(u);
    idx++;
  }

  function onDone(){
    setOrbMode('idle');
    if(continuousMode&&!isThinking) setTimeout(()=>startListening(),600);
  }

  if(window.speechSynthesis.getVoices().length===0){
    window.speechSynthesis.onvoiceschanged=()=>next();
  } else { next(); }
}

// ══════════════════════════════════════════
//  STT
// ══════════════════════════════════════════
let rec=null,listening=false;

function buildRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const r=new SR();
  r.lang='pt-BR'; r.continuous=false; r.interimResults=true;

  r.onstart=()=>{ listening=true; setOrbMode('listening'); };

  r.onresult=e=>{
    let interim='',fin='';
    for(let i=e.resultIndex;i<e.results.length;i++)
      e.results[i].isFinal?fin+=e.results[i][0].transcript:interim+=e.results[i][0].transcript;
    if(interim){
      document.getElementById('jstatus').textContent=interim.slice(0,30).toUpperCase()+'...';
      orbTarget=10+Math.random()*15;
    }
    if(fin.trim()) sendToJarvis(fin.trim());
  };

  r.onerror=e=>{
    listening=false; setOrbMode('idle');
    if(e.error==='not-allowed') speak('Acesso ao microfone negado, senhor.');
    else if(e.error==='no-speech'&&continuousMode) setTimeout(startListening,500);
  };

  r.onend=()=>{ listening=false; if(!isThinking) setOrbMode('idle'); };
  return r;
}

function startListening(){
  if(listening||isThinking)return;
  rec=buildRec();
  if(!rec)return;
  try{ rec.start(); }catch(e){}
}

function toggleVoice(){
  if(window.speechSynthesis&&window.speechSynthesis.speaking){
    window.speechSynthesis.cancel(); setOrbMode('idle');
    if(continuousMode) setTimeout(startListening,400);
    return;
  }
  if(listening){ rec&&rec.stop(); return; }
  startListening();
}

function toggleContinuous(){
  continuousMode=!continuousMode;
  const btn=document.getElementById('contbtn');
  if(continuousMode){
    btn.classList.add('active');
    btn.textContent='🔄 CONTÍNUO ON';
    startListening();
  } else {
    btn.classList.remove('active');
    btn.textContent='🔄 MODO CONTÍNUO';
    if(listening) rec&&rec.stop();
    setOrbMode('idle');
  }
}

// ══════════════════════════════════════════
//  INPUT TEXTO
// ══════════════════════════════════════════
function sendText(){
  const i=document.getElementById('txtin');
  const t=i.value.trim(); if(!t)return;
  i.value=''; sendToJarvis(t);
}
document.getElementById('txtin').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendText();}});

if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}

  speak(`Sistemas inicializados. ${memInfo} Com a devida licença — sou J.A.R.V.I.S. Aguardo suas instruções.`);
},500);
</script>
